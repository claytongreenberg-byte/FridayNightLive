
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Friday Night Live">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Friday Night Live – Football PA Console</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root {
            --bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--primary:#1e3a5f;
            --away-header:#1a3a5c;--home-header:#5c1a1a;
            --away-bg:#0f1f3a;--home-bg:#1f1a17;
            --btn:#f97316;--btn-text:#000;
            --outline-bg:#1e3a5f;--outline-border:#f97316;--outline-text:#f97316;
            --border:#334155;--th-bg:#0f1f3a;--th-text:#fbbf24;
            --gap-bg:#0a0f1a;--section-header-bg:#0f1f3a;
            --touch-target:44px;
            --starter-bg:#fbbf24;--starter-border:#fbbf24;
            --offense-color:#22c55e;--defense-color:#ef4444;--special-color:#8b5cf6;
        }
        body {
            font-family:'Inter','Apple Color Emoji','Segoe UI Emoji',sans-serif;
            background:var(--bg);color:var(--text);
            height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
            font-size:18px;
            padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        header{background:var(--primary);padding:max(8px,env(safe-area-inset-top)) 12px 8px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:3px solid #f97316;flex-shrink:0;min-height:54px;}
        .brand-area{display:flex;align-items:center;gap:8px;}
        .brand-text h1{font-size:1.1rem;color:#fff;font-weight:900;}
        .brand-text p{font-size:0.65rem;color:#f97316;font-weight:600;letter-spacing:1px;}
        .scorebug{display:flex;align-items:center;gap:12px;background:#00000055;padding:5px 16px;border-radius:60px;}
        .scorebug .sb-team{font-weight:700;font-size:0.85rem;color:#fff;min-width:70px;text-align:center;}
        .scorebug .sb-score{font-weight:900;font-size:1.6rem;color:#f97316;min-width:30px;text-align:center;}
        .scorebug .sb-divider{color:#666;font-size:1rem;}
        .scorebug .sb-quarter{font-weight:700;font-size:0.85rem;color:#f97316;background:#00000044;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
        .scorebug button{background:none;border:none;color:#fff;font-size:0.9rem;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;padding:6px;transition:background 0.1s;}
        .scorebug button:hover{background:#ffffff22;}
        .scorebug button:active{transform:scale(0.94);}
        .header-controls{display:flex;align-items:center;gap:6px;}
        .btn,.btn-sm,.btn-xs{border-radius:60px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform 0.1s;line-height:1;}
        .btn:active,.btn-sm:active,.btn-xs:active{transform:scale(0.94);}
        .btn{background:var(--btn);color:var(--btn-text);font-size:0.9rem;padding:10px 20px;min-height:46px;min-width:46px;}
        .btn-sm{background:var(--btn);color:var(--btn-text);font-size:0.8rem;padding:6px 12px;min-height:40px;min-width:40px;}
        .btn-red{background:#dc2626!important;color:white!important;}
        .btn-outline{background:var(--outline-bg);border:2px solid var(--outline-border);color:var(--outline-text);}
        nav{background:#374151;display:flex;padding:0 8px;gap:2px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
        .nav-link{padding:10px 14px;font-size:0.8rem;font-weight:600;background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;border-radius:10px 10px 0 0;white-space:nowrap;min-height:46px;touch-action:manipulation;}
        .nav-link.active{background:#f97316;color:black;}
        main{flex:1;overflow:hidden;padding:8px;display:flex;gap:10px;}
        .game-grid{display:flex;gap:12px;width:100%;height:100%;background:var(--gap-bg);border-radius:14px;padding:6px;}
        .team-card{flex:1;min-width:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
        .team-card.away{background:var(--away-bg);}.team-card.home{background:var(--home-bg);}
        .team-header{padding:6px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;border-bottom:2px solid var(--border);color:#fff;}
        .team-top-row{display:flex;justify-content:space-between;align-items:center;gap:6px;}
        .team-select{font-size:0.9rem;font-weight:700;padding:8px 12px;border-radius:10px;background:#fff;flex:1;border:2px solid var(--border);color:#0a2540;max-width:100%;}
        .side-badge{font-size:0.7rem;font-weight:800;padding:3px 10px;border-radius:60px;text-transform:uppercase;}
        .side-badge.away{background:#1e3a5f;color:white;}.side-badge.home{background:#7f1d1d;color:white;}
        .unit-tabs{display:flex;gap:3px;flex-shrink:0;}
        .unit-tab{padding:6px 14px;font-size:0.75rem;font-weight:700;background:rgba(255,255,255,0.08);border:none;color:#ffffff88;cursor:pointer;border-radius:20px;min-height:36px;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.15s;}
        .unit-tab.active{background:#f97316;color:#000;}
        .unit-tab.st.active{background:#8b5cf6;color:#fff;}
        .player-list-header{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text);opacity:0.7;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--section-header-bg);min-height:30px;}
        .player-list-body{flex:1;overflow-y:auto;}
        .player-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--border);min-height:46px;font-size:0.85rem;transition:background 0.15s;}
        .player-row.starter{background:#fbbf2415;border-left:3px solid var(--starter-border);}
        .plyr-num{font-weight:800;min-width:32px;text-align:center;font-size:0.9rem;color:#fbbf24;flex-shrink:0;}
        .plyr-name{font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.85rem;}
        .plyr-pos{font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:10px;min-width:32px;text-align:center;flex-shrink:0;}
        .plyr-pos.off{background:#22c55e22;color:#22c55e;}.plyr-pos.def{background:#ef444422;color:#ef4444;}.plyr-pos.st{background:#8b5cf622;color:#8b5cf6;}
        .plyr-star{font-size:0.8rem;flex-shrink:0;cursor:pointer;opacity:0.3;min-width:24px;text-align:center;min-height:32px;display:flex;align-items:center;justify-content:center;}
        .plyr-star.active{opacity:1;}
        .add-player-row{display:flex;align-items:center;gap:6px;padding:8px 10px;border-top:2px solid var(--border);flex-wrap:wrap;font-size:0.8rem;flex-shrink:0;background:var(--surface);}
        .add-player-row input,.add-player-row select{padding:6px 8px;border-radius:8px;border:1px solid var(--border);font-size:0.8rem;background:var(--surface);color:var(--text);min-height:38px;}
        .add-player-row .add-num{width:48px;}
        .add-player-row .add-name{flex:1;min-width:100px;}
        .special-bar{display:flex;gap:12px;padding:6px 12px;background:#00000033;flex-shrink:0;font-size:0.75rem;flex-wrap:wrap;align-items:center;justify-content:center;}
        .special-bar .sp-item{display:flex;align-items:center;gap:4px;color:#8b5cf6;font-weight:600;}
        .special-bar .sp-num{font-weight:800;color:#fbbf24;}
        footer{background:#111;text-align:center;padding:8px;font-size:0.65rem;color:#666;flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:12px;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:8px 18px;border-radius:60px;font-size:0.85rem;opacity:0;transition:.2s;pointer-events:none;z-index:999;}
        .toast.show{opacity:1;}
        .panel{background:var(--surface);border-radius:14px;padding:16px;margin:8px;overflow-y:auto;width:100%;}
        .panel input,.panel select,.panel textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:0.9rem;margin:4px;}
        .roster-layout{display:grid;grid-template-columns:240px 1fr;gap:12px;height:100%;width:100%;}
        .team-sidebar{background:var(--surface);border-radius:14px;padding:12px;overflow-y:auto;border:1px solid var(--border);max-height:100%;}
        .team-sidebar h3{font-size:0.85rem;font-weight:700;margin-bottom:10px;color:var(--text);text-transform:uppercase;}
        .team-item{padding:10px 12px;border-radius:8px;margin-bottom:4px;cursor:pointer;background:rgba(255,255,255,0.04);font-weight:600;font-size:0.85rem;min-height:46px;display:flex;align-items:center;transition:transform 60ms ease;color:var(--text);}
        .team-item:active{opacity:0.7;transform:scale(0.94);}
        .team-item.active{background:#f97316;color:#000;font-weight:700;}
        .roster-workspace{background:var(--surface);border-radius:14px;padding:12px;overflow-y:auto;border:1px solid var(--border);}
        .player-edit-row{display:grid;grid-template-columns:50px 1fr 90px 65px 34px;gap:6px;margin-bottom:6px;align-items:center;}
        .player-edit-row input,.player-edit-row select{padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-size:0.8rem;background:var(--surface);color:var(--text);min-height:38px;}
        .player-edit-row button{background:#dc2626;color:#fff;border:none;border-radius:4px;cursor:pointer;min-height:38px;font-weight:700;}
        .parse-area{width:100%;height:100px;font-family:monospace;padding:8px;border-radius:8px;border:1px solid var(--border);margin-top:10px;font-size:0.8rem;background:var(--surface);color:var(--text);resize:vertical;}
        .script-area{width:100%;height:60vh;font-family:monospace;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;resize:vertical;}
        .admin-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
        .admin-tab{padding:8px 14px;border-radius:20px;font-size:0.75rem;font-weight:700;background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;}
        .admin-tab.active{background:#f97316;color:#000;border-color:#f97316;}
        button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid #fbbf24;outline-offset:2px;}
        .pwa-back-btn{display:block;position:fixed;bottom:max(8px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:9999;background:rgba(0,0,0,0.7);color:#fff;padding:8px 18px;border-radius:24px;font-size:0.75rem;font-weight:700;text-decoration:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);letter-spacing:0.3px;border:1px solid rgba(255,255,255,0.2);white-space:nowrap;}
        @media(max-width:900px){.game-grid{flex-direction:column;}.roster-layout{grid-template-columns:1fr;}.team-sidebar{max-height:150px;}}
        @media(max-width:600px){.parse-area{height:120px;}.scorebug{gap:6px;padding:4px 12px;font-size:0.85rem;}}
    </style>
</head>
<body>
<a href="https://voiceofdfw.com" class="pwa-back-btn" aria-label="Back to Voice of DFW">← Back to Voice of DFW</a>
<header>
    <div class="brand-area">
        <div class="brand-text"><h1>🏈 FRIDAY NIGHT LIVE</h1><p>FOOTBALL PA CONSOLE</p></div>
    </div>
    <div class="scorebug" id="scorebug">
        <span class="sb-team" id="sbAway">AWAY</span>
        <span class="sb-score" id="sbAwayScore">0</span>
        <button onclick="changeScore('away',-1)" aria-label="Decrease away score">−</button>
        <button onclick="changeScore('away',1)" aria-label="Increase away score">+</button>
        <span class="sb-divider">-</span>
        <button onclick="changeScore('home',-1)" aria-label="Decrease home score">−</button>
        <button onclick="changeScore('home',1)" aria-label="Increase home score">+</button>
        <span class="sb-score" id="sbHomeScore">0</span>
        <span class="sb-team" id="sbHome">HOME</span>
        <div class="sb-quarter">
            <button onclick="changeQuarter(-1)" aria-label="Previous quarter">◀</button>
            <span id="sbQuarter">Q1</span>
            <button onclick="changeQuarter(1)" aria-label="Next quarter">▶</button>
        </div>
    </div>
    <div class="header-controls">
        <button class="btn btn-sm" id="printLineupsBtn">🖨️ PRINT</button>
        <button class="btn btn-red btn-sm" id="resetGameBtn">RESET</button>
    </div>
</header>
<nav id="mainNav" role="navigation" aria-label="Main navigation"></nav>
<main id="main" role="main"></main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<footer>
    <span>🏈</span><span>Friday Night Live</span><span>© 2026 Clayton E. Greenberg | VoiceofDFW.com</span>
    <span class="last-saved" id="lastSaved"></span>
</footer>

<script>
    // ═══════════════════════════════════════════════
    // CLOUD API CONFIG
    // ═══════════════════════════════════════════════
    const CLOUD_API_BASE = "https://lineup-api.claytongreenberg.workers.dev/api/lineup";

    const POSITIONS = {
        offense: ['QB','RB','FB','WR','TE','OL','C','G','T'],
        defense: ['DL','DE','DT','LB','OLB','ILB','CB','S','SS','FS','DB'],
        special: ['K','P','LS','KR','PR']
    };
    const ALL_POSITIONS = [...POSITIONS.offense, ...POSITIONS.defense, ...POSITIONS.special];

    function defaultGameState(){
        return {
            awayName:'Away Team', homeName:'Home Team',
            awayScore:0, homeScore:0, quarter:1,
            teams:[
                {id:'away_default',name:'Away Team',players:[]},
                {id:'home_default',name:'Home Team',players:[]}
            ],
            currentTeamId:'away_default',
            scriptContent:'',
            scriptScrollPos:0,
            history:[]
        };
    }

    let state = { 
        currentView:'sport', 
        adminTab:'branding', 
        brand:{title:'FRIDAY NIGHT LIVE',subtitle:'FOOTBALL PA CONSOLE'},
        sports:{football:defaultGameState()} 
    };
    function s(){ return state.sports.football; }

    const STORAGE_KEY = 'fridaynightlive_v3';

    // ═══════════════════════════════════════════════
    // UTILITY
    // ═══════════════════════════════════════════════
    function generatePlayerId(){
        return Date.now().toString(36) + Math.random().toString(36).substring(2);
    }

    function toast(m){
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'), 2500);
    }

    function esc(s){ if(!s)return''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    // ═══════════════════════════════════════════════
    // SAVE / LOAD
    // ═══════════════════════════════════════════════
    async function save(){
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            const el = document.getElementById('lastSaved');
            if(el) el.textContent = 'Saved ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        } catch(e){ console.error('Save error:', e); }
    }

    async function load(){
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if(raw){ const p = JSON.parse(raw); state = p; }
            // Migrate old data: add IDs to players if missing
            if(state.sports && state.sports.football && state.sports.football.teams){
                state.sports.football.teams.forEach(team=>{
                    if(team.players){
                        team.players.forEach(p=>{
                            if(!p.id) p.id = generatePlayerId();
                        });
                    }
                });
            }
        } catch(e){ console.error('Load error:', e); }
        renderAll();
    }

    // ═══════════════════════════════════════════════
    // CLOUD SYNC
    // ═══════════════════════════════════════════════
    async function cloudSaveTeam(teamId){
        const sp = s();
        const team = sp.teams.find(t=>t.id===teamId);
        if(!team) return;
        if(!confirm('Save team "'+team.name+'" to cloud? This will overwrite any previous version.')) return;
        try {
            toast('Saving to cloud...');
            const r = await fetch(CLOUD_API_BASE+'?id=friday_'+encodeURIComponent(teamId), {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify(team)
            });
            if(!r.ok) throw new Error('HTTP '+r.status);
            toast('✅ Team saved to cloud');
        } catch(e){ toast('❌ Cloud save failed: '+e.message); }
    }

    async function cloudLoadTeams(){
        try {
            toast('Fetching cloud teams...');
            const r = await fetch(CLOUD_API_BASE+'?list=true');
            const data = await r.json();
            const keys = (data.keys||[]).filter(k=>k.startsWith('friday_'));
            if(!keys.length){ toast('No teams found in cloud'); return; }
            const key = prompt('Available teams:\n'+keys.map(k=>k.replace('friday_','')).join(', ')+'\n\nEnter team key to load:');
            if(!key) return;
            const fullKey = key.startsWith('friday_') ? key : 'friday_'+key;
            const r2 = await fetch(CLOUD_API_BASE+'?id='+encodeURIComponent(fullKey));
            const team = await r2.json();
            if(!team.id||!team.name) throw new Error('Invalid team data');
            
            const sp = s();
            const exists = sp.teams.find(t=>t.id===team.id);
            if(exists && !confirm(`Team "${exists.name}" already exists. Overwrite? (This cannot be undone)`)) return;
            
            // Add IDs to players if missing
            if(team.players){
                team.players.forEach(p=>{ if(!p.id) p.id = generatePlayerId(); });
            }
            
            if(exists){
                exists.name = team.name;
                exists.players = team.players||[];
            } else {
                team.id = team.id.replace('friday_','');
                sp.teams.push(team);
            }
            sp.currentTeamId = team.id;
            save(); renderRoster(); renderNav();
            toast('✅ Team loaded from cloud');
        } catch(e){ toast('❌ Cloud load failed: '+e.message); }
    }

    async function cloudSaveAll(){
        const sp = s();
        if(!confirm('Save ALL teams to cloud? This will overwrite any previous versions.')) return;
        try {
            toast('Saving all teams...');
            let saved = 0;
            for(const team of sp.teams){
                try{
                    await fetch(CLOUD_API_BASE+'?id=friday_'+encodeURIComponent(team.id), {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify(team)
                    });
                    saved++;
                } catch(e){ console.warn('Failed to save team '+team.name); }
            }
            toast('✅ '+saved+' team(s) saved to cloud');
        } catch(e){ toast('❌ Cloud save failed: '+e.message); }
    }

    // ═══════════════════════════════════════════════
    // SCORE & QUARTER
    // ═══════════════════════════════════════════════
    function changeScore(side,d){
        const sp = s();
        if(side==='away'){ sp.awayScore = Math.max(0, sp.awayScore + d); }
        else { sp.homeScore = Math.max(0, sp.homeScore + d); }
        updateScorebug(); save();
    }

    function changeQuarter(d){
        const sp = s();
        const maxQuarter = 6; // Q1-Q4, OT, 2OT, 3OT
        sp.quarter = Math.min(maxQuarter, Math.max(1, sp.quarter + d));
        updateScorebug(); save();
    }

    function updateScorebug(){
        const sp = s();
        document.getElementById('sbAway').textContent = (sp.awayName||'AWAY').substring(0,8).toUpperCase();
        document.getElementById('sbHome').textContent = (sp.homeName||'HOME').substring(0,8).toUpperCase();
        document.getElementById('sbAwayScore').textContent = sp.awayScore||0;
        document.getElementById('sbHomeScore').textContent = sp.homeScore||0;
        const quarters = ['Q1','Q2','Q3','Q4','OT','2OT','3OT'];
        document.getElementById('sbQuarter').textContent = quarters[sp.quarter-1] || 'Q1';
    }

    // ═══════════════════════════════════════════════
    // PLAYERS
    // ═══════════════════════════════════════════════
    function getPlayers(side, unit){
        const sp = s();
        const teamName = side==='away' ? sp.awayName : sp.homeName;
        const team = sp.teams.find(t=>t.name===teamName);
        if(!team || !team.players) return [];
        let filtered = team.players.filter(p=>{
            if(unit==='offense') return POSITIONS.offense.includes(p.pos);
            if(unit==='defense') return POSITIONS.defense.includes(p.pos);
            if(unit==='special') return POSITIONS.special.includes(p.pos);
            return true;
        });
        filtered.sort((a,b)=>{
            const na = parseInt(a.num)||999, nb = parseInt(b.num)||999;
            return na - nb;
        });
        return filtered;
    }

    function addPlayer(side){
        const numEl = document.getElementById('add-num-'+side);
        const nameEl = document.getElementById('add-name-'+side);
        const posEl = document.getElementById('add-pos-'+side);
        if(!nameEl.value.trim()){ toast('Enter a name'); return; }
        const sp = s();
        const teamName = side==='away' ? sp.awayName : sp.homeName;
        const team = sp.teams.find(t=>t.name===teamName);
        if(!team) return;
        team.players.push({
            id: generatePlayerId(),
            num: numEl.value.trim(),
            name: nameEl.value.trim(),
            pos: posEl.value,
            starter: false
        });
        
        // CLEAR FIELDS
        numEl.value = '';
        nameEl.value = '';
        posEl.value = 'QB';
        nameEl.focus();
        
        save(); renderSport(); toast(nameEl.value.trim()+' added');
    }

    function toggleStarter(side, playerId, unit){
        const sp = s();
        const teamName = side==='away' ? sp.awayName : sp.homeName;
        const team = sp.teams.find(t=>t.name===teamName);
        if(!team) return;
        const player = team.players.find(p=>p.id===playerId);
        if(!player) return;
        player.starter = !player.starter;
        save(); renderSport();
    }

    function deletePlayer(side, playerId, unit){
        const sp = s();
        const teamName = side==='away' ? sp.awayName : sp.homeName;

        });
        sidebarHTML += '<button class="btn-sm" style="margin-top:10px;width:100%;min-height:40px;" onclick="newTeam()">+ NEW TEAM</button>';

        let playerRows = '';
        pl.forEach((p)=>{
            const posOpts = ALL_POSITIONS.map(pos=>`<option ${p.pos===pos?'selected':''}>${pos}</option>`).join('');
            playerRows += `<div class="player-edit-row" data-player-id="${p.id}">
                <input value="${esc(p.num||'')}" placeholder="#" class="rp-num" data-player-id="${p.id}" inputmode="numeric">
                <input value="${esc(p.name||'')}" placeholder="Name" class="rp-name" data-player-id="${p.id}">
                <select class="rp-pos" data-player-id="${p.id}">
                    <optgroup label="Offense">${POSITIONS.offense.map(pos=>`<option ${p.pos===pos?'selected':''}>${pos}</option>`).join('')}</optgroup>
                    <optgroup label="Defense">${POSITIONS.defense.map(pos=>`<option ${p.pos===pos?'selected':''}>${pos}</option>`).join('')}</optgroup>
                    <optgroup label="Special Teams">${POSITIONS.special.map(pos=>`<option ${p.pos===pos?'selected':''}>${pos}</option>`).join('')}</optgroup>
                </select>
                <select class="rp-starter" data-player-id="${p.id}"><option value="0" ${!p.starter?'selected':''}>Sub</option><option value="1" ${p.starter?'selected':''}>Starter</option></select>
                <button onclick="deleteRosterPlayer('${p.id}')">✖</button>
            </div>`;
        });

        document.getElementById('main').innerHTML = `<div class="panel">
            <div class="roster-layout">
                <div class="team-sidebar">${sidebarHTML}</div>
                <div class="roster-workspace" id="rosterWorkspace">
                    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
                        <input id="editTeamName" value="${esc(ct?ct.name:'')}" placeholder="Team Name" style="flex:1;min-width:150px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:0.9rem;background:var(--surface);color:var(--text);">
                        <button class="btn-sm" id="saveTeamBtn">💾 SAVE</button>
                        <button class="btn-sm" id="cloudSaveTeamBtn" style="background:#6366f1;color:#fff;">☁️ SAVE</button>
                        <button class="btn-sm" id="cloudLoadTeamsBtn">📥 LOAD</button>
                        <button class="btn-sm btn-red" id="deleteTeamBtn">🗑️ DELETE</button>
                    </div>
                    <div style="display:grid;grid-template-columns:50px 1fr 90px 65px 34px;gap:6px;font-size:0.7rem;font-weight:600;margin-bottom:6px;opacity:0.7;">
                        <span>#</span><span>Name</span><span>Position</span><span>Role</span><span></span>
                    </div>
                    <div id="rosterPlayerGrid">${playerRows}</div>
                    <button class="btn-sm" id="addPlayerBtn" style="margin-top:8px;">➕ ADD ROW</button>
                    <textarea class="parse-area" id="parseRosterText" rows="3" placeholder="Paste roster: 7 Williams QB | 22 Johnson RB | 88 Smith WR"></textarea>
                    <button class="btn-sm" id="parseRosterBtn" style="margin-top:6px;">📝 PARSE</button>
                </div>
            </div>
        </div>`;

        document.getElementById('saveTeamBtn').onclick = ()=>{
            const t = sp.teams.find(t=>t.id===sp.currentTeamId);
            if(t){
                t.name = document.getElementById('editTeamName').value.trim();
                if(!t.name) { toast('Team name cannot be empty'); return; }
                t.players = collectRosterPlayers();
            }
            save(); renderRoster(); renderNav(); toast('Team saved');
        };
        document.getElementById('cloudSaveTeamBtn').onclick = ()=>{
            const t = sp.teams.find(t=>t.id===sp.currentTeamId);
            if(t){
                t.name = document.getElementById('editTeamName').value.trim();
                if(!t.name) { toast('Team name cannot be empty'); return; }
                t.players = collectRosterPlayers();
                save();
                cloudSaveTeam(sp.currentTeamId);
            }
        };
        document.getElementById('cloudLoadTeamsBtn').onclick = ()=>cloudLoadTeams();
        document.getElementById('deleteTeamBtn').onclick = ()=>{
            const t = sp.teams.find(t=>t.id===sp.currentTeamId);
            if(!t) return;
            if(!confirm('Delete "'+t.name+'"? This cannot be undone.')) return;
            sp.teams = sp.teams.filter(team=>team.id!==sp.currentTeamId);
            if(sp.teams.length===0) sp.teams.push({id:Date.now().toString(36),name:'New Team',players:[]});
            sp.currentTeamId = sp.teams[0].id;
            if(sp.awayName===t.name) sp.awayName = sp.teams[0].name;
            if(sp.homeName===t.name) sp.homeName = sp.teams[0].name;
            save(); renderRoster(); renderNav(); toast('Team deleted');
        };
        document.getElementById('addPlayerBtn').onclick = ()=>{
            const t = sp.teams.find(t=>t.id===sp.currentTeamId);
            if(t){ 
                t.players.push({id:generatePlayerId(),num:'',name:'',pos:'QB',starter:false}); 
                save(); renderRoster(); 
            }
        };
        document.getElementById('parseRosterBtn').onclick = ()=>{
            const txt = document.getElementById('parseRosterText').value;
            const t = sp.teams.find(t=>t.id===sp.currentTeamId);
            if(!t) return;
            if(!txt.trim()){ toast('Nothing to parse'); return; }
            const lines = txt.split(/\r?\n/);
            const newPlayers = [];
            lines.forEach(line=>{
                if(!line.trim()) return;
                
                // Try to extract number (must be at start)
                let num = '', rest = line.trim();
                const numMatch = rest.match(/^(\d{1,3})\s+/);
                if(numMatch) {
                    num = numMatch[1];
                    rest = rest.slice(numMatch[0].length).trim();
                }
                
                // Try to extract position (must be a known position at end)
                let pos = 'QB', name = rest;
                const words = rest.split(/\s+/);
                if(words.length > 0 && ALL_POSITIONS.includes(words[words.length-1].toUpperCase())) {
                    pos = words.pop().toUpperCase();
                    name = words.join(' ');
                }
                
                if(name) newPlayers.push({id:generatePlayerId(),num,name,pos,starter:false});
            });
            if(newPlayers.length===0){ toast('No players found'); return; }
            t.players = newPlayers; save(); renderRoster(); toast(newPlayers.length+' players parsed');
        };
    }

    function collectRosterPlayers(){
        const grid = document.getElementById('rosterPlayerGrid');
        if(!grid) return [];
        const rows = grid.querySelectorAll('.player-edit-row');
        const arr = [];
        rows.forEach(rw=>{
            const playerId = rw.dataset.playerId;
            const numEl = rw.querySelector('.rp-num');
            const nameEl = rw.querySelector('.rp-name');
            const posEl = rw.querySelector('.rp-pos');
            const starterEl = rw.querySelector('.rp-starter');
            arr.push({
                id: playerId,
                num: numEl ? numEl.value : '',
                name: nameEl ? nameEl.value : '',
                pos: posEl ? posEl.value : 'QB',
                starter: starterEl ? starterEl.value==='1' : false
            });
        });
        return arr;
    }

    function deleteRosterPlayer(playerId){
        const sp = s();
        const t = sp.teams.find(t=>t.id===sp.currentTeamId);
        if(!t) return;
        const player = t.players.find(p=>p.id===playerId);
        if(!player) return;
        if(!confirm('Delete '+player.name+'?')) return;
        t.players = t.players.filter(p=>p.id!==playerId);
        save(); renderRoster();
    }

    function selectRosterTeam(teamId){ s().currentTeamId = teamId; renderRoster(); }
    function newTeam(){
        let name = prompt('Team name:');
        while(!name || !name.trim()){
            name = prompt('Team name cannot be empty. Enter team name:');
            if(name === null) return;
        }
        const sp = s();
        const id = Date.now().toString(36);
        sp.teams.push({id,name:name.trim(),players:[]});
        sp.currentTeamId = id;
        save(); renderRoster(); renderNav();
    }

            document.getElementById('exportAll').onclick = ()=>{
                const a = document.createElement('a');
