<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Friday Night Live">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Friday Night Live – Football PA Console</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root {
            --bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--primary:#1e3a5f;
            --away-header:#1a3a5c;--home-header:#5c1a1a;
            --away-bg:#0f1f3a;--home-bg:#1f1a17;
            --btn:#f97316;--btn-text:#000;
            --outline-bg:#1e3a5f;--outline-border:#f97316;--outline-text:#f97316;
            --border:#334155;--th-bg:#0f1f3a;--th-text:#fbbf24;
            --gap-bg:#0a0f1a;--section-header-bg:#0f1f3a;
            --touch-target:44px;
            --starter-bg:#fbbf24;--starter-border:#fbbf24;
            --offense-color:#22c55e;--defense-color:#ef4444;--special-color:#8b5cf6;
            --font-family:'Inter', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
        }
        body {
            font-family:var(--font-family);
            background:var(--bg);color:var(--text);
            height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
            font-size:18px;
            padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        header {
            position:relative;
            background: #1e3a5f;
            background-image: linear-gradient(to bottom, #2d6a1e, #1f4d14);
            padding:max(8px,env(safe-area-inset-top)) 12px 8px 12px;
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
            border-bottom:3px solid var(--btn);
            flex-shrink:0; min-height:54px;
            overflow:hidden;
        }
        .turf-overlay {
            position:absolute; inset:0; pointer-events:none; z-index:0;
        }
        .turf-overlay svg {
            width:100%; height:100%;
        }
        .header-left{display:flex;align-items:center;gap:8px;z-index:1; background:rgba(0,0,0,0.5); border-radius:8px; padding:2px 8px;}
        .back-link{background:none;border:none;color:var(--text);font-size:0.75rem;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:6px;text-decoration:none;transition:all 0.2s;opacity:0.7;}
        .back-link:hover{opacity:1;background:rgba(255,255,255,0.1);}
        .brand-area{display:flex;align-items:center;gap:8px;z-index:1; background:rgba(0,0,0,0.5); border-radius:8px; padding:4px 10px;}
        .brand-logo{height:36px; width:auto;}
        .brand-text h1{font-size:1.1rem;color:#fff;font-weight:900;text-shadow:0 0 6px rgba(0,0,0,0.8);}
        .brand-text p{font-size:0.65rem;color:var(--btn);font-weight:600;letter-spacing:1px;}
        .header-center{display:flex;align-items:center;gap:12px;z-index:1;}
        .wall-clock{font-size:0.85rem;font-weight:600;color:var(--btn);min-width:80px;text-align:center; background:rgba(0,0,0,0.5); border-radius:8px; padding:4px 8px;}
        .scorebug{display:flex;align-items:center;gap:12px;background:#00000055;padding:5px 16px;border-radius:60px;}
        .scorebug .sb-team{font-weight:700;font-size:0.85rem;color:#fff;min-width:70px;text-align:center;display:flex;align-items:center;gap:4px;}
        .sb-team-logo{width:24px;height:24px;object-fit:contain;border-radius:4px;}
        .scorebug .sb-score{font-weight:900;font-size:1.6rem;color:var(--btn);min-width:30px;text-align:center;}
        .scorebug .sb-divider{color:#666;font-size:1rem;}
        .scorebug .sb-quarter{font-weight:700;font-size:0.85rem;color:var(--btn);background:#00000044;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
        .scorebug button{background:none;border:none;color:#fff;font-size:0.9rem;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;padding:6px;transition:background 0.1s;}
        .scorebug button:hover{background:#ffffff22;}
        .scorebug button:active{transform:scale(0.94);}
        .header-controls{display:flex;align-items:center;gap:6px;z-index:1; background:rgba(0,0,0,0.5); border-radius:8px; padding:4px 8px;}
        .theme-toggle-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:1.2rem;cursor:pointer;min-width:44px;min-height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
        .theme-toggle-btn:hover{background:rgba(255,255,255,0.3);}
        .btn,.btn-sm,.btn-xs{border-radius:60px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform 0.1s;line-height:1;}
        .btn:active,.btn-sm:active,.btn-xs:active{transform:scale(0.94);}
        .btn{background:var(--btn);color:var(--btn-text);font-size:0.9rem;padding:10px 20px;min-height:46px;min-width:46px;}
        .btn-sm{background:var(--btn);color:var(--btn-text);font-size:0.8rem;padding:6px 12px;min-height:40px;min-width:40px;}
        .btn-red{background:#dc2626!important;color:white!important;}
        .btn-outline{background:var(--outline-bg);border:2px solid var(--outline-border);color:var(--outline-text);}
        nav{background:#374151;display:flex;padding:0 8px;gap:2px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
        .nav-link{padding:10px 14px;font-size:0.8rem;font-weight:600;background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;border-radius:10px 10px 0 0;white-space:nowrap;min-height:46px;touch-action:manipulation;}
        .nav-link.active{background:var(--btn);color:black;}
        main{flex:1;overflow:hidden;padding:8px;display:flex;gap:10px;}
        .game-grid{display:flex;gap:12px;width:100%;height:100%;background:var(--gap-bg);border-radius:14px;padding:6px;}
        .team-card{flex:1;min-width:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;}
        .team-card.away{background:var(--away-bg);}.team-card.home{background:var(--home-bg);}
        .team-header{padding:6px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;border-bottom:2px solid var(--border);color:#fff;}
        .team-top-row{display:flex;justify-content:space-between;align-items:center;gap:6px;}
        .team-select{font-size:0.9rem;font-weight:700;padding:8px 12px;border-radius:10px;background:#fff;flex:1;border:2px solid var(--border);color:#0a2540;max-width:100%;}
        .side-badge{font-size:0.7rem;font-weight:800;padding:3px 10px;border-radius:60px;text-transform:uppercase;}
        .side-badge.away{background:#1e3a5f;color:white;}.side-badge.home{background:#7f1d1d;color:white;}
        .unit-tabs{display:flex;gap:3px;flex-shrink:0;}
        .unit-tab{padding:6px 14px;font-size:0.75rem;font-weight:700;background:rgba(255,255,255,0.08);border:none;color:#ffffff88;cursor:pointer;border-radius:20px;min-height:36px;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.15s;}
        .unit-tab.active{background:var(--btn);color:#000;}
        .unit-tab.st.active{background:#8b5cf6;color:#fff;}
        .player-list-header{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text);opacity:0.7;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--section-header-bg);min-height:30px;}
        .player-list-body{flex:1;overflow-y:auto;}
        .player-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--border);min-height:46px;font-size:0.85rem;transition:background 0.15s;}
        .player-row.starter{background:var(--starter-bg)15;border-left:3px solid var(--starter-border);}
        .plyr-num{font-weight:800;min-width:32px;text-align:center;font-size:0.9rem;color:var(--starter-bg);flex-shrink:0;}
        .plyr-name{font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.85rem; display:flex; align-items:center; gap:4px;}
        .plyr-notes-icon{font-size:0.8rem; cursor:help; flex-shrink:0;}
        .plyr-pos{font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:10px;min-width:32px;text-align:center;flex-shrink:0;}
        .plyr-pos.off{background:#22c55e22;color:#22c55e;}.plyr-pos.def{background:#ef444422;color:#ef4444;}.plyr-pos.st{background:#8b5cf622;color:#8b5cf6;}
        .plyr-star{font-size:0.8rem;flex-shrink:0;cursor:pointer;opacity:0.3;min-width:24px;text-align:center;min-height:32px;display:flex;align-items:center;justify-content:center;}
        .plyr-star.active{opacity:1;}
        .add-player-row{display:flex;align-items:center;gap:6px;padding:8px 10px;border-top:2px solid var(--border);flex-wrap:wrap;font-size:0.8rem;flex-shrink:0;background:var(--surface);}
        .add-player-row input,.add-player-row select{padding:6px 8px;border-radius:8px;border:1px solid var(--border);font-size:0.8rem;background:var(--surface);color:var(--text);min-height:38px;}
        .add-player-row .add-num{width:48px;}
        .add-player-row .add-name{flex:1;min-width:100px;}
        .add-player-row .add-notes{flex:2; min-width:120px;}
        footer{background:#111;text-align:center;padding:8px;font-size:0.65rem;color:#666;flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:12px;}
        .footer-logo{height:24px; width:auto;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:8px 18px;border-radius:60px;font-size:0.85rem;opacity:0;transition:.2s;pointer-events:none;z-index:999;}
        .toast.show{opacity:1;}
        .panel{background:var(--surface);border-radius:14px;padding:16px;margin:8px;overflow-y:auto;width:100%;}
        .panel input,.panel select,.panel textarea,.panel input[type="color"]{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:0.9rem;margin:4px;}
        .panel input[type="color"]{width:60px;height:44px;cursor:pointer;}
        .roster-layout{display:grid;grid-template-columns:240px 1fr;gap:12px;height:100%;width:100%;}
        .team-sidebar{background:var(--surface);border-radius:14px;padding:12px;overflow-y:auto;border:1px solid var(--border);max-height:100%;}
        .team-sidebar h3{font-size:0.85rem;font-weight:700;margin-bottom:10px;color:var(--text);text-transform:uppercase;}
        .team-item{padding:10px 12px;border-radius:8px;margin-bottom:4px;cursor:pointer;background:rgba(255,255,255,0.04);font-weight:600;font-size:0.85rem;min-height:46px;display:flex;align-items:center;transition:transform 60ms ease;color:var(--text);}
        .team-item:active{opacity:0.7;transform:scale(0.94);}
        .team-item.active{background:var(--btn);color:#000;font-weight:700;}
        .roster-workspace{background:var(--surface);border-radius:14px;padding:12px;overflow-y:auto;border:1px solid var(--border);}
        /* Adjusted grid for notes column */
        .player-edit-row{display:grid;grid-template-columns:50px 1fr 90px 65px 1fr 34px;gap:6px;margin-bottom:6px;align-items:center;}
        .player-edit-row input,.player-edit-row select{padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-size:0.8rem;background:var(--surface);color:var(--text);min-height:38px;}
        .player-edit-row button{background:#dc2626;color:#fff;border:none;border-radius:4px;cursor:pointer;min-height:38px;font-weight:700;}
        .parse-area{width:100%;height:100px;font-family:monospace;padding:8px;border-radius:8px;border:1px solid var(--border);margin-top:10px;font-size:0.8rem;background:var(--surface);color:var(--text);resize:vertical;}
        .script-area{width:100%;height:60vh;font-family:monospace;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;resize:vertical;}
        .admin-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
        .admin-tab{padding:8px 14px;border-radius:20px;font-size:0.75rem;font-weight:700;background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;}
        .admin-tab.active{background:var(--btn);color:#000;border-color:var(--btn);}
        .color-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:12px 0;}
        .color-input-group{display:flex;flex-direction:column;gap:6px;}
        .color-input-group label{font-size:0.8rem;font-weight:600;text-transform:uppercase;opacity:0.7;}
        .color-input-group input[type="color"]{width:100%;height:60px;border-radius:8px;cursor:pointer;}
        .mode-toggle{display:flex;gap:8px;margin:12px 0;}
        .mode-btn{flex:1;padding:12px;border-radius:8px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;cursor:pointer;transition:all 0.2s;}
        .mode-btn.active{background:var(--btn);color:#000;border-color:var(--btn);}
        .branding-section{margin-top:16px;padding-top:12px;border-top:2px solid var(--border);}
        .branding-section h4{margin-bottom:8px;}
        .logo-preview{width:60px;height:60px;object-fit:contain;background:#fff;border-radius:8px;border:1px solid var(--border);}
        button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--btn);outline-offset:2px;}
        @media(max-width:900px){.game-grid{flex-direction:column;}.roster-layout{grid-template-columns:1fr;}.team-sidebar{max-height:150px;}}
        @media(max-width:600px){.parse-area{height:120px;}.scorebug{gap:6px;padding:4px 12px;font-size:0.85rem;}.header-left{flex:1;}}
        .unsaved-indicator{color:#f97316;font-weight:bold;display:none;margin-left:8px;}
    </style>
</head>
<body>

        </svg>
    </div>
    <div class="header-left">
        <a href="https://voiceofdfw.com" class="back-link" aria-label="Back to Voice of DFW">← VoiceofDFW.com</a>
    </div>
    <div class="brand-area">
        <img src="FNL.jpg" alt="Friday Night Live logo" class="brand-logo">
        <div class="brand-text"><h1>🏈 FRIDAY NIGHT LIVE</h1><p>FOOTBALL PA CONSOLE</p></div>

    <div class="header-center">

            <span class="sb-team" id="sbAway">AWAY</span>

<script>
    // ═══════════════════════════════════════════════
    // CLOUD API CONFIG
    // ═══════════════════════════════════════════════
    const CLOUD_API_BASE = "https://lineup-api.claytongreenberg.workers.dev/api/lineup";

    const POSITIONS = {
        offense: ['QB','RB','FB','WR','TE','OL','C','G','T'],
        defense: ['DL','DE','DT','LB','OLB','ILB','CB','S','SS','FS','DB'],
        special: ['K','P','LS','KR','PR']
    };
    const ALL_POSITIONS = [...POSITIONS.offense, ...POSITIONS.defense, ...POSITIONS.special];

    function defaultGameState(){
        return {
            awayTeamId:'away_default',
            homeTeamId:'home_default',
            awayScore:0,
            homeScore:0,
            quarter:1,
            teams:[
                {id:'away_default',name:'Away Team',players:[], color:'#1e3a5f', colorSecondary:'#ffffff', logo:'', mascot:''},
                {id:'home_default',name:'Home Team',players:[], color:'#7f1d1d', colorSecondary:'#ffffff', logo:'', mascot:''}
            ],
            currentTeamId:'away_default',
            scriptContent:'',
            scriptScrollPos:0,
            history:[],
            scriptDirty: false
        };
    }

    let state = { 
        currentView:'sport', 
        adminTab:'branding',
        mode:'dark',
        unit_away:'all',
        unit_home:'all',
        brand:{title:'FRIDAY NIGHT LIVE',subtitle:'FOOTBALL PA CONSOLE'},
        fontFamily:"'Inter', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif",
        clockFormat:'12h',
        clockShowSeconds:true,
        colors:{
            bg:'#0f172a',
            surface:'#1e293b',
            text:'#f1f5f9',
            primary:'#1e3a5f',
            btn:'#f97316',
            btnText:'#000',
            border:'#334155',
            away:'#1e3a5f',
            home:'#7f1d1d',
            awayBg:'#0f1f3a',
            homeBg:'#1f1a17',
            offense:'#22c55e',
            defense:'#ef4444',
            special:'#8b5cf6',
            starter:'#fbbf24'
        },
        sports:{football:defaultGameState()} 
    };
    function s(){ return state.sports.football; }

    const STORAGE_KEY = 'fridaynightlive_v9'; // bumped for notes

    // ═══════════════════════════════════════════════
    // UTILITY – XSS-safe escaping
    // ═══════════════════════════════════════════════
    function generatePlayerId(){ return Date.now().toString(36) + Math.random().toString(36).substring(2); }
    function toast(m){
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'), 2500);
    }
    function esc(s){
        if(!s) return '';
        return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }

    // ═══════════════════════════════════════════════
    // CONTRAST CHECKER
    // ═══════════════════════════════════════════════
    function getLuminance(hex) {
        const c = hex.substring(1);
        const rgb = parseInt(c, 16);
        const r = (rgb>>16)&0xff, g = (rgb>>8)&0xff, b = rgb&0xff;
        const [rs,gs,bs] = [r,g,b].map(v => { v/=255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055,2.4); });
        return 0.2126*rs + 0.7152*gs + 0.0722*bs;
    }
    function contrastRatio(fg,bg){ const l1=getLuminance(fg),l2=getLuminance(bg); const hi=Math.max(l1,l2),lo=Math.min(l1,l2); return (hi+0.05)/(lo+0.05); }
    function checkContrast(fg,bg){ return contrastRatio(fg,bg)>=4.5; }

    function updateTheme(){
        const root = document.documentElement;
        const c = state.colors;
        root.style.setProperty('--bg', c.bg);
        root.style.setProperty('--surface', c.surface);
        root.style.setProperty('--text', c.text);
        root.style.setProperty('--primary', c.primary);
        root.style.setProperty('--btn', c.btn);
        root.style.setProperty('--btn-text', c.btnText);
        root.style.setProperty('--border', c.border);
        root.style.setProperty('--away-header', c.away);
        root.style.setProperty('--home-header', c.home);
        root.style.setProperty('--away-bg', c.awayBg);
        root.style.setProperty('--home-bg', c.homeBg);
        root.style.setProperty('--offense-color', c.offense);
        root.style.setProperty('--defense-color', c.defense);
        root.style.setProperty('--special-color', c.special);
        root.style.setProperty('--starter-bg', c.starter);
        root.style.setProperty('--starter-border', c.starter);
        root.style.setProperty('--font-family', state.fontFamily);
        const toggleBtn = document.getElementById('themeToggleBtn');
        if(toggleBtn) toggleBtn.textContent = state.mode==='light' ? '☀️' : '🌙';
        save();
    }

    function applyLightMode(){
        state.mode = 'light';
        state.colors = {
            bg:'#ffffff',surface:'#f3f4f6',text:'#1f2937',primary:'#3b82f6',btn:'#f97316',
            btnText:'#000',border:'#d1d5db',
            away:'#1e3a8a',home:'#991b1b',
            awayBg:'#e0e7ff',homeBg:'#fee2e2',
            offense:'#16a34a',defense:'#dc2626',special:'#7c3aed',starter:'#eab308'
        };
        updateTheme(); toast('✅ Light mode enabled');
    }
    function applyDarkMode(){
        state.mode = 'dark';
        state.colors = {
            bg:'#0f172a',surface:'#1e293b',text:'#f1f5f9',primary:'#1e3a5f',btn:'#f97316',
            btnText:'#000',border:'#334155',
            away:'#1e3a5f',home:'#7f1d1d',
            awayBg:'#0f1f3a',homeBg:'#1f1a17',
            offense:'#22c55e',defense:'#ef4444',special:'#8b5cf6',starter:'#fbbf24'
        };
        updateTheme(); toast('✅ Dark mode enabled');
    }
    function toggleTheme(){
        if(state.mode==='dark') applyLightMode();
        else applyDarkMode();
    }

    // ═══════════════════════════════════════════════
    // WALL CLOCK
    // ═══════════════════════════════════════════════
    function updateClock(){
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2,'0');
        const seconds = String(now.getSeconds()).padStart(2,'0');
        let timeStr = '';
        if(state.clockFormat === '12h'){
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            timeStr = `${hours}:${minutes}`;
            if(state.clockShowSeconds) timeStr += `:${seconds}`;
            timeStr += ` ${ampm}`;
        } else {
            hours = String(hours).padStart(2,'0');
            timeStr = `${hours}:${minutes}`;
            if(state.clockShowSeconds) timeStr += `:${seconds}`;
        }
        document.getElementById('wallClock').textContent = timeStr;
    }
    setInterval(updateClock, 1000); updateClock();

    // ═══════════════════════════════════════════════
    // SAVE / LOAD (with migration)
    // ═══════════════════════════════════════════════
    function normalizeStateAfterLoad() {
        const sp = s();
        const defaultGame = defaultGameState();
        for(const key of Object.keys(defaultGame)){
            if(sp[key]===undefined) sp[key]=defaultGame[key];
        }
        if(!sp.teams.find(t=>t.id===sp.awayTeamId)) sp.awayTeamId = sp.teams[0]?.id || 'away_default';
        if(!sp.teams.find(t=>t.id===sp.homeTeamId)) sp.homeTeamId = sp.teams[1]?.id || 'home_default';
        sp.teams.forEach(t=>{
            if(typeof t.color!=='string') t.color='#1e3a5f';
            if(typeof t.colorSecondary!=='string') t.colorSecondary='#ffffff';
            if(typeof t.logo!=='string') t.logo='';
            if(typeof t.mascot!=='string') t.mascot='';
            // ensure notes field exists
            t.players.forEach(p=>{ if(typeof p.notes !== 'string') p.notes = ''; });
        });
        if(typeof sp.scriptDirty==='undefined') sp.scriptDirty=false;
        if(typeof state.fontFamily!=='string') state.fontFamily="'Inter', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif";
        if(typeof state.clockFormat!=='string') state.clockFormat='12h';
        if(typeof state.clockShowSeconds!=='boolean') state.clockShowSeconds=true;
        if(!state.unit_away) state.unit_away = 'all';
        if(!state.unit_home) state.unit_home = 'all';
        if(!state.colors.awayBg) state.colors.awayBg = (state.mode==='light'?'#e0e7ff':'#0f1f3a');
        if(!state.colors.homeBg) state.colors.homeBg = (state.mode==='light'?'#fee2e2':'#1f1a17');
    }

    async function save(){
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            const el = document.getElementById('lastSaved');
            if(el) el.textContent = 'Saved ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        } catch(e){ console.error('Save error:', e); }
    }

    async function load(){
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if(raw){
                const parsed = JSON.parse(raw);
                state = { ...state, ...parsed };
                if(parsed.sports && parsed.sports.football){
                    state.sports.football = { ...defaultGameState(), ...parsed.sports.football };
                }
            } else {
                state.sports.football = defaultGameState();
            }
            s().teams.forEach(team=>{
                if(team.players) team.players.forEach(p=>{ if(!p.id) p.id=generatePlayerId(); });
            });
            normalizeStateAfterLoad();
        } catch(e){ console.error('Load error:', e); }
        updateTheme();
        renderAll();
    }

    // ═══════════════════════════════════════════════
    // CLOUD SYNC
    // ═══════════════════════════════════════════════
    async function cloudSaveTeam(teamId){
        const sp=s(); const team=sp.teams.find(t=>t.id===teamId); if(!team) return;
        if(!confirm('Save team "'+team.name+'" to cloud?')) return;
        try{
            toast('Saving...');
            const r=await fetch(CLOUD_API_BASE+'?id=friday_'+encodeURIComponent(teamId),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(team)});
            if(!r.ok) throw new Error('HTTP '+r.status);
            toast('✅ Team saved');
        } catch(e){ toast('❌ '+e.message); }
    }
    async function cloudLoadTeams(){
        try{
            toast('Fetching cloud teams...');
            const r=await fetch(CLOUD_API_BASE+'?list=true');
            const data=await r.json();
            const keys=(data.keys||[]).filter(k=>k.startsWith('friday_'));
            if(!keys.length){ toast('No teams found'); return; }
            const key=prompt('Available teams:\n'+keys.map(k=>k.replace('friday_','')).join(', ')+'\n\nEnter team key:');
            if(!key) return;
            const fullKey=key.startsWith('friday_')?key:'friday_'+key;
            const r2=await fetch(CLOUD_API_BASE+'?id='+encodeURIComponent(fullKey));
            const team=await r2.json();
            if(!team.id||!team.name) throw new Error('Invalid team');
            const sp=s(); const exists=sp.teams.find(t=>t.id===team.id);
            if(exists && !confirm('Team "'+exists.name+'" exists. Overwrite?')) return;
            if(team.players) team.players.forEach(p=>{ if(!p.id) p.id=generatePlayerId(); });
            if(exists){ exists.name=team.name; exists.players=team.players||[]; }
            else { team.id=team.id.replace('friday_',''); sp.teams.push(team); }
            sp.currentTeamId=team.id; save(); renderRoster(); renderNav(); toast('✅ Team loaded');
        } catch(e){ toast('❌ '+e.message); }
    }
    async function cloudSaveAll(){
        const sp=s(); if(!confirm('Save ALL teams?')) return;
        try{
            toast('Saving all...'); let saved=0;
            for(const team of sp.teams){ try{ await fetch(CLOUD_API_BASE+'?id=friday_'+encodeURIComponent(team.id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(team)}); saved++; } catch(e){} }
            toast('✅ '+saved+' saved');
        } catch(e){ toast('❌ '+e.message); }
    }

    // ═══════════════════════════════════════════════
    // SCORE & QUARTER
    // ═══════════════════════════════════════════════
    function changeScore(side,d){ const sp=s(); if(side==='away') sp.awayScore=Math.max(0,sp.awayScore+d); else sp.homeScore=Math.max(0,sp.homeScore+d); updateScorebug(); save(); }
    function changeQuarter(d){ const sp=s(); sp.quarter=Math.min(6,Math.max(1,sp.quarter+d)); updateScorebug(); save(); }
    function updateScorebug(){
        const sp=s();
        const awayTeam=sp.teams.find(t=>t.id===sp.awayTeamId);
        const homeTeam=sp.teams.find(t=>t.id===sp.homeTeamId);
        const awayName=awayTeam?awayTeam.name:'AWAY';
        const homeName=homeTeam?homeTeam.name:'HOME';
        const awayEl=document.getElementById('sbAway');
        const homeEl=document.getElementById('sbHome');
        if(awayTeam&&awayTeam.logo) awayEl.innerHTML=`<img class="sb-team-logo" src="${esc(awayTeam.logo)}" alt="${esc(awayName)} logo"> ${esc(awayName.substring(0,8))}`;
        else awayEl.textContent=awayName.substring(0,8).toUpperCase();
        if(homeTeam&&homeTeam.logo) homeEl.innerHTML=`<img class="sb-team-logo" src="${esc(homeTeam.logo)}" alt="${esc(homeName)} logo"> ${esc(homeName.substring(0,8))}`;
        else homeEl.textContent=homeName.substring(0,8).toUpperCase();
        document.getElementById('sbAwayScore').textContent=sp.awayScore||0;
        document.getElementById('sbHomeScore').textContent=sp.homeScore||0;
        const quarters=['Q1','Q2','Q3','Q4','OT','2OT','3OT'];
        document.getElementById('sbQuarter').textContent=quarters[sp.quarter-1]||'Q1';
    }

    // ═══════════════════════════════════════════════
    // PLAYERS (now with notes)
    // ═══════════════════════════════════════════════
    function getTeamBySide(side){ const sp=s(); return sp.teams.find(t=>t.id===(side==='away'?sp.awayTeamId:sp.homeTeamId))||null; }
    function getPlayers(side, unit){
        const team=getTeamBySide(side);
        if(!team||!team.players) return [];
        if(unit === 'all') {
            return [...team.players].sort((a,b)=>(parseInt(a.num)||999)-(parseInt(b.num)||999));
        }
        let filtered=team.players.filter(p=>{
            if(unit==='offense') return POSITIONS.offense.includes(p.pos);
            if(unit==='defense') return POSITIONS.defense.includes(p.pos);
            if(unit==='special') return POSITIONS.special.includes(p.pos);
            return true;
        });
        filtered.sort((a,b)=>(parseInt(a.num)||999)-(parseInt(b.num)||999));
        return filtered;
    }
    function addPlayer(side){
        const numEl=document.getElementById('add-num-'+side), nameEl=document.getElementById('add-name-'+side), posEl=document.getElementById('add-pos-'+side);
        const notesEl=document.getElementById('add-notes-'+side);
        if(!nameEl.value.trim()){ toast('Enter a name'); return; }
        const team=getTeamBySide(side); if(!team) return;
        team.players.push({id:generatePlayerId(),num:numEl.value.trim(),name:nameEl.value.trim(),pos:posEl.value,starter:false, notes: notesEl ? notesEl.value.trim() : ''});
        numEl.value=''; nameEl.value=''; posEl.value='QB'; if(notesEl) notesEl.value=''; nameEl.focus();
        save(); renderSport(); toast(nameEl.value.trim()+' added');
    }
    function toggleStarter(side, playerId){
        const team=getTeamBySide(side); if(!team) return;
        const player=team.players.find(p=>p.id===playerId); if(!player) return;
        player.starter=!player.starter; save(); renderSport();
    }
    function deletePlayer(side, playerId){
        const team=getTeamBySide(side); if(!team) return;
        const player=team.players.find(p=>p.id===playerId); if(!player) return;
        if(!confirm('Delete '+player.name+'?')) return;
        team.players=team.players.filter(p=>p.id!==playerId); save(); renderSport();
    }

    // SPORT VIEW (notes icon added)

    function renderSport(){
        const sp=s();

                        <select class="team-select" data-side="${side}" onchange="switchTeam('${side}',this.value)" aria-label="Select team for ${side}">
                            ${sp.teams.map(t=>`<option value="${esc(t.id)}" ${t.id=== (side==='away'?sp.awayTeamId:sp.homeTeamId)?'selected':''}>${esc(t.name)}</option>`).join('')}
                        </select>

                    <div class="unit-tabs">
                        <button class="unit-tab ${activeUnit==='all'?'active':''}" onclick="setUnit('${side}','all')">ALL</button>

                    <span style="width:32px;">#</span><span style="flex:1;">PLAYER</span><span style="width:40px;">POS</span><span style="width:30px;text-align:center;">⭐</span><span style="width:20px;"></span>

            const players=getPlayers(side,activeUnit);
            players.forEach(p=>{

                const notesAttr = p.notes ? ` title="${esc(p.notes)}"` : '';

                </div>`;
            });
            h+=`</div>
                <div class="add-player-row">
                    <input class="add-num" id="add-num-${side}" placeholder="#" aria-label="Jersey number" inputmode="numeric">
                    <input class="add-name" id="add-name-${side}" placeholder="Player name" aria-label="Player name">
                    <select id="add-pos-${side}" aria-label="Position">
                        <optgroup label="Offense">${POSITIONS.offense.map(p=>`<option>${p}</option>`).join('')}</optgroup>
                        <optgroup label="Defense">${POSITIONS.defense.map(p=>`<option>${p}</option>`).join('')}</optgroup>

                    <button class="btn-sm" onclick="addPlayer('${side}')">+ ADD</button>
                </div>
            </div>`;
        });
        h+='</div>';
        document.getElementById('main').innerHTML=h;
        updateScorebug();
    }
    function setUnit(side,unit){ state['unit_'+side]=unit; renderSport(); }
    function switchTeam(side,teamId){ const sp=s(); if(side==='away') sp.awayTeamId=teamId; else sp.homeTeamId=teamId; save(); renderSport(); }

                    </div>
                </div>
            </div>
        </div>`;

        document.getElementById('saveTeamBtn').onclick=()=>{
            const t=sp.teams.find(t=>t.id===sp.currentTeamId);
            if(t){
                t.name=document.getElementById('editTeamName').value.trim();
                if(!t.name){ toast('Team name cannot be empty'); return; }
                t.players=collectRosterPlayers();
                t.color=document.getElementById('teamPrimaryColor').value;
                t.colorSecondary=document.getElementById('teamSecondaryColor').value;
                t.mascot=document.getElementById('teamMascot').value.trim();
            }
            save(); renderRoster(); renderNav(); toast('Team saved');
        };
        document.getElementById('cloudSaveTeamBtn').onclick=()=>{
            const t=sp.teams.find(t=>t.id===sp.currentTeamId);
            if(t){
                t.name=document.getElementById('editTeamName').value.trim();
                t.players=collectRosterPlayers();
                t.color=document.getElementById('teamPrimaryColor').value;
                t.colorSecondary=document.getElementById('teamSecondaryColor').value;
                t.mascot=document.getElementById('teamMascot').value.trim();
                save();
                cloudSaveTeam(sp.currentTeamId);
            }
        };
        document.getElementById('cloudLoadTeamsBtn').onclick=()=>cloudLoadTeams();
        document.getElementById('deleteTeamBtn').onclick=()=>{
            const t=sp.teams.find(t=>t.id===sp.currentTeamId);
            if(!t) return;
            if(!confirm('Delete "'+t.name+'"? This cannot be undone.')) return;
            sp.teams=sp.teams.filter(team=>team.id!==sp.currentTeamId);
            if(sp.teams.length===0) sp.teams.push({id:Date.now().toString(36),name:'New Team',players:[],color:'#1e3a5f',colorSecondary:'#fff',logo:'',mascot:''});
            sp.currentTeamId=sp.teams[0].id;
            if(sp.awayTeamId===t.id) sp.awayTeamId=sp.teams[0].id;
            if(sp.homeTeamId===t.id) sp.homeTeamId=sp.teams[0].id;
            save(); renderRoster(); renderNav(); toast('Team deleted');
        };
        document.getElementById('addPlayerBtn').onclick=()=>{
            const t=sp.teams.find(t=>t.id===sp.currentTeamId);
            if(t){ t.players.push({id:generatePlayerId(),num:'',name:'',pos:'',starter:false,notes:''}); save(); renderRoster(); }
        };
        document.getElementById('parseRosterBtn').onclick=()=>{
            const txt=document.getElementById('parseRosterText').value;
            parseRosterText(txt);
        };
        document.getElementById('rosterFileUpload').addEventListener('change', function(e){
            const file=e.target.files[0];
            if(!file) return;
            const reader=new FileReader();
            reader.onload=function(ev){
                document.getElementById('parseRosterText').value=ev.target.result;
                parseRosterText(ev.target.result);
            };
            reader.readAsText(file);
        });
        document.getElementById('teamLogoFile').addEventListener('change', function(e){
            const file=e.target.files[0];
            if(!file||!file.type.startsWith('image/')) return;
            const reader=new FileReader();
            reader.onload=function(ev){
                const t=sp.teams.find(t=>t.id===sp.currentTeamId);
                if(t){ t.logo=ev.target.result; document.getElementById('teamLogoPreview').src=ev.target.result; document.getElementById('teamLogoPreview').style.display='inline-block'; save(); toast('Logo updated (save to persist)'); }
            };
            reader.readAsDataURL(file);
        });
    }

    function parseRosterText(txt){
        const t=s().teams.find(t=>t.id===s().currentTeamId);
        if(!t) return;
        if(!txt.trim()){ toast('Nothing to parse'); return; }
        const lines=txt.split(/\r?\n/);
        const newPlayers=[];
        lines.forEach(line=>{
            if(!line.trim()) return;
            let num='', rest=line.trim();
            const numMatch=rest.match(/^(\d{1,3})\s+/);
            if(numMatch){ num=numMatch[1]; rest=rest.slice(numMatch[0].length).trim(); }
            let pos='', name=rest;
            const words=rest.split(/\s+/);
            if(words.length>0 && ALL_POSITIONS.includes(words[words.length-1].toUpperCase())){
                pos=words.pop().toUpperCase(); name=words.join(' ');
            }
            if(name) newPlayers.push({id:generatePlayerId(),num,name,pos,starter:false,notes:''});
        });
        if(newPlayers.length===0){ toast('No players found'); return; }
        t.players=newPlayers; save(); renderRoster(); toast(newPlayers.length+' players parsed');
    }

    function collectRosterPlayers(){
        const grid=document.getElementById('rosterPlayerGrid');
        if(!grid) return [];
        const rows=grid.querySelectorAll('.player-edit-row');
        const arr=[];
        rows.forEach(rw=>{
            const playerId=rw.dataset.playerId;
            const numEl=rw.querySelector('.rp-num');
            const nameEl=rw.querySelector('.rp-name');
            const posEl=rw.querySelector('.rp-pos');
            const starterEl=rw.querySelector('.rp-starter');
            const notesEl=rw.querySelector('.rp-notes');
            arr.push({
                id: playerId,
                num: numEl ? numEl.value : '',
                name: nameEl ? nameEl.value : '',
                pos: posEl ? posEl.value : '',
                starter: starterEl ? starterEl.value==='1' : false,
                notes: notesEl ? notesEl.value : ''
            });
        });
        return arr;
    }
    function deleteRosterPlayer(playerId){
        const sp=s(); const t=sp.teams.find(t=>t.id===sp.currentTeamId); if(!t) return;
        if(!confirm('Delete player?')) return;
        t.players=t.players.filter(p=>p.id!==playerId); save(); renderRoster();
    }
    function selectRosterTeam(teamId){ s().currentTeamId=teamId; renderRoster(); }
    function newTeam(){
        let name=prompt('Team name:');
        while(!name||!name.trim()){ name=prompt('Team name cannot be empty:'); if(name===null) return; }
        const sp=s(); const id=Date.now().toString(36);
        sp.teams.push({id,name:name.trim(),players:[],color:'#1e3a5f',colorSecondary:'#fff',logo:'',mascot:''});
        sp.currentTeamId=id; save(); renderRoster(); renderNav();
    }

    // ═══════════════════════════════════════════════
    // SCRIPT VIEW
    // ═══════════════════════════════════════════════
    function renderScript(){
        const sp=s();
        document.getElementById('main').innerHTML=`<div style="display:flex;flex-direction:column;height:100%;width:100%;background:var(--surface);border-radius:14px;padding:16px;overflow:hidden;">
            <h3 style="flex-shrink:0;margin-bottom:8px;">🎙️ PA SCRIPT</h3>
            <textarea id="scriptText" class="script-area" placeholder="PA announcements..." aria-label="Script editor">${esc(sp.scriptContent||'')}</textarea>
            <div style="flex-shrink:0;display:flex;gap:8px;margin-top:12px;">
                <button class="btn btn-sm" id="saveScript">💾 SAVE</button>
                <button class="btn btn-sm" id="printScript">🖨️ PRINT</button>
                <span id="scriptDirtyIndicator" style="color:#f97316;font-weight:bold;margin-left:8px;display:${sp.scriptDirty?'inline':'none'};">⚠️ Unsaved</span>
            </div>
        </div>`;
        const scriptText=document.getElementById('scriptText');
        if(sp.scriptScrollPos) scriptText.scrollTop=sp.scriptScrollPos;
        scriptText.addEventListener('input',()=>{
            s().scriptDirty=true;
            document.getElementById('scriptDirtyIndicator').style.display='inline';
        });
        document.getElementById('saveScript').onclick=()=>{
            sp.scriptContent=scriptText.value; sp.scriptScrollPos=scriptText.scrollTop; sp.scriptDirty=false;
            save(); document.getElementById('scriptDirtyIndicator').style.display='none'; toast('Script saved');
        };
        document.getElementById('printScript').onclick=()=>{
            const w=window.open();
            w.document.write(`<pre style="font-family:monospace;white-space:pre-wrap;word-wrap:break-word;">${esc(sp.scriptContent)}</pre>`);
            w.print();
        };
    }

    // ═══════════════════════════════════════════════
    // ADMIN VIEW
    // ═══════════════════════════════════════════════
    function renderAdmin(){
        const tabs=['branding','colors','theme','fonts','clock','teams','backup','cloud'];
        const tabLabels={branding:'🏷️ Branding',colors:'🎨 Colors',theme:'🌓 Theme',fonts:'🔤 Fonts',clock:'🕒 Clock',teams:'🏆 Teams',backup:'💾 Backup',cloud:'☁️ Cloud'};
        let h=`<div class="panel"><h3>⚙️ ADMIN CONSOLE</h3><div class="admin-tabs">`;
        tabs.forEach(t=>{ h+=`<button class="admin-tab ${state.adminTab===t?'active':''}" data-admin-tab="${t}">${tabLabels[t]}</button>`; });
        h+=`</div><div id="adminContent"></div></div>`;
        document.getElementById('main').innerHTML=h;
        document.querySelectorAll('[data-admin-tab]').forEach(b=>{
            b.onclick=()=>{ state.adminTab=b.dataset.adminTab; renderAdmin(); };
        });
        renderAdminContent();
    }
    function showContrastWarning(show){ const warn=document.getElementById('contrastWarning'); if(warn) warn.style.display=show?'inline':'none'; }

    function renderAdminContent(){
        const container=document.getElementById('adminContent');
        if(!container) return;
        const sp=s();
        if(state.adminTab==='branding'){
            container.innerHTML=`<h4>🏷️ Branding</h4>
                <label for="brandTitle">Brand Title</label><input id="brandTitle" value="${esc(state.brand.title)}">
                <label for="brandSub">Subtitle</label><input id="brandSub" value="${esc(state.brand.subtitle)}">
                <button class="btn btn-sm" id="saveBranding" style="margin-top:10px;">💾 Save</button>`;
            document.getElementById('saveBranding').onclick=()=>{
                const title=document.getElementById('brandTitle').value.trim();
                const sub=document.getElementById('brandSub').value.trim();
                if(!title){ toast('Title cannot be empty'); return; }
                state.brand={title,subtitle:sub}; save();
                document.querySelector('.brand-text h1').textContent='🏈 '+title;
                document.querySelector('.brand-text p').textContent=sub;
                toast('✅ Branding updated');
            };
        } else if(state.adminTab==='colors'){
            let html=`<h4>🎨 Custom Colors</h4>
                <p style="font-size:0.8rem;opacity:0.6;margin-bottom:12px;">Customize every color. <span id="contrastWarning" style="color:#ef4444;font-weight:bold;margin-left:8px;display:none;">⚠️ Low contrast</span></p>
                <div class="color-grid">`;
            const colorLabels={
                bg:'Background',surface:'Surface',text:'Text',primary:'Primary',btn:'Button',btnText:'Button Text',
                border:'Border',away:'Away Header',home:'Home Header',awayBg:'Away Card BG',homeBg:'Home Card BG',
                offense:'Offense',defense:'Defense',special:'Special Teams',starter:'Starter Badge'
            };
            for(const [key,label] of Object.entries(colorLabels)){
                html+=`<div class="color-input-group"><label for="color_${key}">${label}</label>
                <input type="color" id="color_${key}" value="${state.colors[key]}" onchange="updateColorPicker('${key}', this.value)"></div>`;
            }
            html+=`</div><button class="btn btn-sm" style="margin-top:12px;" onclick="toast('Colors saved automatically')">💾 Saved</button>`;
            container.innerHTML=html;
            showContrastWarning(!checkContrast(state.colors.text, state.colors.bg));
        } else if(state.adminTab==='theme'){
            container.innerHTML=`<h4>🌓 Theme Mode</h4>
                <p style="font-size:0.8rem;opacity:0.6;margin-bottom:12px;">Click the 🌙/☀️ button in the header or choose here.</p>
                <div class="mode-toggle">
                    <button class="mode-btn ${state.mode==='dark'?'active':''}" onclick="applyDarkMode()">🌙 Dark Mode</button>
                    <button class="mode-btn ${state.mode==='light'?'active':''}" onclick="applyLightMode()">☀️ Light Mode</button>
                </div>`;
        } else if(state.adminTab==='fonts'){
            const fonts=[ {name:'Inter',value:"'Inter', sans-serif"},{name:'Roboto',value:"'Roboto', sans-serif"},{name:'Open Sans',value:"'Open Sans', sans-serif"},{name:'Lato',value:"'Lato', sans-serif"},{name:'Montserrat',value:"'Montserrat', sans-serif"},{name:'Oswald',value:"'Oswald', sans-serif"},{name:'System UI',value:"system-ui"} ];
            let options=fonts.map(f=>`<option value="${esc(f.value)}" ${state.fontFamily===f.value?'selected':''}>${f.name}</option>`).join('');
            container.innerHTML=`<h4>🔤 Font Family</h4>
                <select id="fontSelect" style="font-size:0.9rem;padding:8px;">${options}</select>
                <button class="btn-sm" id="applyFontBtn" style="margin-left:8px;">Apply</button>`;
            document.getElementById('applyFontBtn').onclick=()=>{
                state.fontFamily=document.getElementById('fontSelect').value; updateTheme(); toast('✅ Font updated');
            };
        } else if(state.adminTab==='clock'){
            container.innerHTML=`<h4>🕒 Clock Settings</h4>
                <label><input type="radio" name="clockFormat" value="12h" ${state.clockFormat==='12h'?'checked':''}> 12‑hour (AM/PM)</label><br>
                <label><input type="radio" name="clockFormat" value="24h" ${state.clockFormat==='24h'?'checked':''}> 24‑hour (Military)</label><br><br>
                <label><input type="checkbox" id="clockSeconds" ${state.clockShowSeconds?'checked':''}> Show seconds</label><br><br>
                <button class="btn-sm" id="saveClockBtn">💾 Save Clock Settings</button>`;
            document.getElementById('saveClockBtn').onclick=()=>{
                const format=document.querySelector('input[name="clockFormat"]:checked').value;
                const showSeconds=document.getElementById('clockSeconds').checked;
                state.clockFormat=format; state.clockShowSeconds=showSeconds;
                save(); updateClock(); toast('Clock settings saved');
            };
        } else if(state.adminTab==='teams'){
            let html='<h4>🏆 Team Management</h4>';
            sp.teams.forEach(t=>{
                html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:6px;background:var(--surface);border-radius:8px;">
                    <span style="flex:1;font-weight:600;">${esc(t.name)}</span>
                    <span style="font-size:0.75rem;opacity:0.5;">${t.players.length} players</span>
                    <button class="btn-sm" onclick="state.sports.football.currentTeamId='${t.id}';state.currentView='roster';renderAll();">✏️</button>
                </div>`;
            });
            container.innerHTML=html;
        } else if(state.adminTab==='backup'){
            container.innerHTML=`<h4>💾 Backup & Restore</h4>
                <button class="btn btn-sm" id="exportAll">📤 EXPORT ALL DATA</button>
                <button class="btn btn-sm" id="importAll" style="margin-left:6px;">📥 IMPORT DATA</button>
                <input type="file" id="importFile" hidden accept=".json">
                <button class="btn btn-sm btn-red" onclick="if(confirm('Clear all data?')){localStorage.clear();location.reload();}" style="margin-top:10px;">🧹 Clear All Data</button>`;
            document.getElementById('exportAll').onclick=()=>{
                const a=document.createElement('a');
                a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)]));
                a.download='fridaynightlive_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
            };
            document.getElementById('importAll').onclick=()=>document.getElementById('importFile').click();
            document.getElementById('importFile').onchange=e=>{
                const f=e.target.files[0];
                if(!f) return;
                if(f.size>5000000){ toast('File too large (>5MB)'); return; }
                toast('Importing...');
                const r=new FileReader();
                r.onload=ev=>{
                    try{
                        const d=JSON.parse(ev.target.result);
                        if(!d.sports||!d.sports.football) throw new Error('Invalid format');
                        state=d; normalizeStateAfterLoad(); save(); updateTheme(); renderAll(); toast('✅ Data restored');
                    }catch(err){ toast('❌ Import failed: '+err.message); }
                    document.getElementById('importFile').value='';
                };
                r.readAsText(f);

            container.innerHTML=`<h4>☁️ Cloud Sync</h4>

                <button class="btn btn-sm" id="cloudLoadTeamsAdminBtn" style="margin-left:6px;">📥 LOAD TEAM</button>`;
            document.getElementById('cloudSaveAllBtn').onclick=()=>cloudSaveAll();
            document.getElementById('cloudLoadTeamsAdminBtn').onclick=()=>cloudLoadTeams();
        }
    }

    function updateColorPicker(key, value){
        state.colors[key]=value; updateTheme();
        if(key==='text'||key==='bg'){
            const ok=checkContrast(state.colors.text,state.colors.bg);
            showContrastWarning(!ok);
            if(!ok) toast('⚠️ Low contrast');
        }
        toast('✅ '+key+' updated');
    }

    // ═══════════════════════════════════════════════
    // PRINT (includes notes)
    // ═══════════════════════════════════════════════
    function printLineups(){
        const sp=s();
        const awayTeam=sp.teams.find(t=>t.id===sp.awayTeamId);
        const homeTeam=sp.teams.find(t=>t.id===sp.homeTeamId);
        const awayName=awayTeam?awayTeam.name:'AWAY';
        const homeName=homeTeam?homeTeam.name:'HOME';
        let html=`<html><head><title>Lineups - ${esc(awayName)} vs ${esc(homeName)}</title><style>body{font-family:sans-serif;padding:20px;}h2{margin-top:20px;border-bottom:2px solid #000;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #000;padding:8px;}th{background:#ddd;}.starter{background:#fffacd;}</style></head><body>
            <h1>${esc(awayName)} vs ${esc(homeName)}</h1>
            <p>Score: ${esc(awayName)} ${sp.awayScore} - ${sp.homeScore} ${esc(homeName)}</p>
            <h2>Full Rosters</h2>`;
        ['away','home'].forEach(side=>{
            const team=getTeamBySide(side);
            const teamName=team?team.name:'Unknown';
            html+=`<h3>${esc(teamName)}</h3><table><tr><th>#</th><th>Player</th><th>Pos</th><th>Notes</th></tr>`;
            getPlayers(side,'all').forEach(p=>html+=`<tr class="${p.starter?'starter':''}"><td>${esc(p.num)}</td><td>${esc(p.name)}${p.starter?' ⭐':''}</td><td>${esc(p.pos)}</td><td>${esc(p.notes||'')}</td></tr>`);
            html+=`</table>`;
        });
        html+='</body></html>';
        const w=window.open(); w.document.write(html); w.onload=()=>w.print();
    }

    // ═══════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════
    function renderNav(){
        const nav=document.getElementById('mainNav');
        nav.innerHTML=`
            <button class="nav-link ${state.currentView==='sport'?'active':''}" data-view="sport" aria-current="${state.currentView==='sport'?'page':'false'}">🏈 GAME</button>
            <button class="nav-link ${state.currentView==='roster'?'active':''}" data-view="roster" aria-current="${state.currentView==='roster'?'page':'false'}">📋 ROSTERS</button>
            <button class="nav-link ${state.currentView==='script'?'active':''}" data-view="script" aria-current="${state.currentView==='script'?'page':'false'}">🎙️ SCRIPT</button>
            <button class="nav-link ${state.currentView==='admin'?'active':''}" data-view="admin" aria-current="${state.currentView==='admin'?'page':'false'}">⚙️ ADMIN</button>
        `;
        nav.onclick=function(e){
            const btn=e.target.closest('button');
            if(!btn) return;
            state.currentView=btn.dataset.view;
            renderNav(); renderMain();
        };
        document.getElementById('unsavedIndicator').style.display=s().scriptDirty?'inline':'none';
    }
    function renderMain(){
        if(state.currentView==='roster') renderRoster();
        else if(state.currentView==='script') renderScript();
        else if(state.currentView==='admin') renderAdmin();
        else renderSport();
    }
    function renderAll(){ renderNav(); renderMain(); updateScorebug(); }

    function globalReset(){
        if(confirm('Reset game scores and starters? (Teams kept)')){
            const sp=s(); sp.awayScore=0; sp.homeScore=0; sp.quarter=1;
            sp.teams.forEach(t=>t.players.forEach(p=>p.starter=false));
            save(); renderAll(); toast('✅ Game reset');
        }
    }

    // ═══════════════════════════════════════════════
    // KEYBOARD SHORTCUTS
    // ═══════════════════════════════════════════════
    document.addEventListener('keydown',(e)=>{
        if(e.key==='s' && (e.ctrlKey||e.metaKey)){ e.preventDefault(); save(); toast('✅ Saved'); }
        if(e.key==='p' && (e.ctrlKey||e.metaKey) && state.currentView==='sport'){ e.preventDefault(); printLineups(); }
    });
    window.addEventListener('beforeunload',(e)=>{
        if(s().scriptDirty){ e.preventDefault(); e.returnValue=''; }
    });

    document.getElementById('resetGameBtn').onclick=()=>globalReset();
    document.getElementById('printLineupsBtn').onclick=()=>printLineups();

    // expose
    window.changeScore=changeScore; window.changeQuarter=changeQuarter;
    window.addPlayer=addPlayer; window.toggleStarter=toggleStarter; window.deletePlayer=deletePlayer;
    window.setUnit=setUnit; window.switchTeam=switchTeam;
    window.selectRosterTeam=selectRosterTeam; window.newTeam=newTeam; window.deleteRosterPlayer=deleteRosterPlayer;
    window.updateColorPicker=updateColorPicker; window.applyLightMode=applyLightMode; window.applyDarkMode=applyDarkMode;

    (async function init(){
        await load();
        renderAll();
    })();
</script>
