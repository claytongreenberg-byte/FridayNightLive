<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Lineup Card Live | Digital Pressbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }
        :root {
            --primary-navy: #1f3a5e;
            --primary-gold: #e6b422;
            --accent-red: #c41e3a;
            --bg-light: #f4f6fa;
            --surface-light: #fff;
            --text-light: #0f172a;
            --border-light: #dce3ec;
            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --text-dark: #f1f5f9;
            --border-dark: #334155;
            --touch-target: 44px;
            --font-base: 18px;
            --atbat-bg: #fff9c4;
            --atbat-text: #000;
            --dark-atbat-bg: #5c4200;
            --dark-atbat-text: #ffe082;
            --away-color: #1d4ed8;
            --home-color: #c41e3a;
            --hud-away-bg: #e8f0fe;
            --hud-home-bg: #fce8e8;
            --bug-team-name-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --bug-team-name-size: 0.65rem;
            --bug-team-name-color: #ffffff;
            --bug-team-name-weight: 700;
            --card-team-label-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --card-team-label-size: 0.85rem;
            --card-team-label-color: var(--text-light);
            --card-team-label-weight: 700;
            --card-head-visitor-bg: #ffffff;
            --card-head-home-bg: #ffffff;
            --scorebug-bg: rgba(0, 0, 0, .3);
            --scorebug-text-color: #ffffff;
            --clock-footer-bg: #111111;
            --clock-footer-text: #ffffff;
            --clock-footer-size: 13px;
            --version: '8.0'
        }
        body.dark-mode {
            --bg-light: var(--bg-dark);
            --surface-light: var(--surface-dark);
            --text-light: var(--text-dark);
            --border-light: var(--border-dark);
            --atbat-bg: var(--dark-atbat-bg);
            --atbat-text: var(--dark-atbat-text);
            --hud-away-bg: #1e293b;
            --hud-home-bg: #1e293b;
            --card-head-visitor-bg: #1e293b;
            --card-head-home-bg: #1e293b;
            --scorebug-bg: rgba(255, 255, 255, .08);
            --scorebug-text-color: #f1f5f9;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: var(--font-base);
            transition: background 0.2s, color 0.2s;
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        body::before {
            content: '';
            position: fixed;
            top: env(safe-area-inset-top);
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-red);
            z-index: 2000;
        }
        header {
            background: var(--primary-navy);
            color: #fff;
            padding: 8px 12px;
            padding-top: max(8px, calc(env(safe-area-inset-top) - 4px));
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--primary-gold);
            flex-shrink: 0;
            gap: 12px;
            min-height: 56px;
            flex-wrap: nowrap;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .logo-main {
            height: 38px;
            width: auto;
            object-fit: contain;
            border-radius: 3px;
            padding: 1px;
            background: transparent !important;
            box-shadow: 0 0 0 2px var(--primary-gold);
        }
        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            text-align: center;
            justify-content: center;
        }
        .brand-text h1 {
            font-size: .95rem;
            font-weight: 800;
            color: #fff;
            white-space: nowrap;
        }
        .brand-text p {
            font-size: .7rem;
            text-transform: uppercase;
            color: var(--primary-gold);
            font-weight: 800;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0, 0, 0, .5);
        }
        .header-center {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .score-bug {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--scorebug-bg);
            border-radius: 20px;
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, .1);
        }
        .score-bug.hidden {
            display: none;
        }
        .bug-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }
        .bug-team-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 3px;
            margin-bottom: 2px;
        }
        .bug-team-name {
            font-weight: var(--bug-team-name-weight);
            font-size: var(--bug-team-name-size);
            font-family: var(--bug-team-name-font);
            color: var(--bug-team-name-color);
            text-align: center;
        }
        .bug-score {
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--scorebug-text-color);
            min-width: 24px;
            text-align: center;
        }
        .bug-score-btn {
            background: rgba(255, 255, 255, .15);
            border: none;
            color: var(--scorebug-text-color);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
        }
        .bug-divider {
            color: #666;
            font-weight: 300;
            font-size: 1rem;
        }
        .bug-inning {
            display: flex;
            align-items: center;
            gap: 3px;
            background: rgba(0, 0, 0, .3);
            border-radius: 12px;
            padding: 3px 8px;
        }
        .bug-inning span {
            font-weight: 700;
            font-size: .65rem;
            color: var(--primary-gold);
            min-width: 24px;
            text-align: center;
        }
        .bug-inning button {
            background: rgba(255, 255, 255, .15);
            border: none;
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 9px;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .header-hud-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }
        .header-hud-badge {
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: .75rem;
            font-weight: 700;
            white-space: nowrap;
            color: var(--text-light);
            min-height: 32px;
            display: flex;
            align-items: center;
        }
        #headerHudAway {
            background: var(--hud-away-bg);
        }
        #headerHudHome {
            background: var(--hud-home-bg);
        }
        .timers-area {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }
        .timer-pill {
            background: rgba(0, 0, 0, .35);
            border: 1px solid var(--accent-red);
            border-radius: 16px;
            padding: 3px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: .65rem;
        }
        .timer-label {
            font-weight: 600;
            color: var(--primary-gold);
        }
        .timer-value {
            font-family: monospace;
            font-weight: 700;
            min-width: 28px;
            font-size: .7rem;
        }
        .weather-pill {
            background: rgba(0, 0, 0, .35);
            border: 1px solid var(--primary-gold);
            border-radius: 16px;
            padding: 3px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: .62rem;
            color: #fff;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: default;
        }
        .weather-pill .wx-icon {
            font-size: .85rem;
        }
        .weather-pill .wx-location {
            color: var(--primary-gold);
            font-weight: 600;
            font-size: .58rem;
        }
        .weather-pill .wx-detail {
            color: #cbd5e1;
            font-size: .56rem;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            touch-action: manipulation;
            pointer-events: auto !important;
        }
        .btn-icon {
            background: rgba(255, 255, 255, .2);
            border: none;
            color: #fff;
            padding: 4px 6px;
            border-radius: 12px;
            font-size: .65rem;
            min-height: 28px;
            min-width: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon.green {
            background: #2e7d32;
        }
        .btn-icon.wx-color {
            background: #e6a817;
            color: #000;
        }
        .reset-pill {
            background: var(--accent-red);
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 16px;
            font-weight: 700;
            font-size: .7rem;
        }
        .header-btn {
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .3);
            color: #fff;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: .7rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .toggle-bug-btn {
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .3);
            color: #fff;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: .65rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .toggle-bug-btn.active {
            background: var(--primary-gold);
            color: #0a1c3a;
            border-color: var(--primary-gold);
        }
        .back-link {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: 700;
            font-size: .7rem;
            padding: 4px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .12);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }
        .theme-toggle {
            background: rgba(0, 0, 0, .4);
            border-radius: 12px;
            padding: 1px;
            display: flex;
        }
        .theme-btn {
            background: none;
            border: none;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: .65rem;
            color: #fff;
            font-weight: 600;
        }
        .theme-btn.active {
            background: var(--primary-gold);
            color: #0a1c3a;
        }
        nav {
            background: #374151;
            display: flex;
            padding: 0 8px;
            gap: 2px;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .nav-link {
            padding: 10px 14px;
            background: none;
            border: none;
            font-weight: 700;
            font-size: .8rem;
            text-transform: uppercase;
            color: #fff;
            border-bottom: 3px solid transparent;
            min-height: 40px;
            white-space: nowrap;
        }
        .nav-link.active {
            border-bottom-color: var(--primary-gold);
        }
        :focus-visible {
            outline: 2px solid var(--primary-gold);
            outline-offset: 2px;
        }
        #main-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        main {
            flex: 1;
            padding: 6px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .view-pane {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .view-pane.active {
            display: flex;
        }
        #admin.view-pane.active {
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 6px;
        }
        .gameday-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
            min-height: 0;
            overflow: hidden;
        }
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .lineup-card {
            background: var(--surface-light);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
            min-height: 0;
        }
        .card-head {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            border-left-width: 5px;
            border-left-style: solid;
            min-height: 42px;
            z-index: 2;
        }
        .card-head.visitor {
            border-left-color: var(--away-color);
            background: var(--card-head-visitor-bg);
        }
        .card-head.home {
            border-left-color: var(--home-color);
            background: var(--card-head-home-bg);
        }
        .team-label {
            font-size: var(--card-team-label-size);
            font-family: var(--card-team-label-font);
            font-weight: var(--card-team-label-weight);
            color: var(--card-team-label-color);
            text-transform: uppercase;
        }
        .team-logo-inline {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .team-select-wrapper {
            position: relative;
            flex: 1;
            min-width: 130px;
        }
        .team-select-wrapper::after {
            content: "▼";
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: .6rem;
            color: #666;
            z-index: 1;
        }
        .team-select {
            width: 100%;
            padding: 8px 24px 8px 8px;
            border-radius: 8px;
            font-weight: 700;
            font-size: .88rem;
            background: var(--surface-light);
            color: var(--text-light);
            border: 2px solid var(--border-light);
            min-height: 40px;
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            pointer-events: auto;
        }
        #visitorTeamSelect {
            color: var(--away-color);
            border-color: var(--away-color);
        }
        #homeTeamSelect {
            color: var(--home-color);
            border-color: var(--home-color);
        }
        .lineup-scroll {
            overflow-y: scroll;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
            background: var(--surface-light);
        }
        .lineup-scroll::-webkit-scrollbar {
            width: 12px;
            height: 12px;
            -webkit-appearance: none;
        }
        .lineup-scroll::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 6px;
        }
        .lineup-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 6px;
            border: 2px solid var(--surface-light);
        }
        .lineup-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: .9rem;
            table-layout: fixed;
            min-width: 500px;
        }
        .lineup-table thead {
            position: sticky;
            top: 0;
            z-index: 3;
        }
        .lineup-table th {
            position: sticky;
            top: 0;
            z-index: 2;
            text-align: left;
            padding: 7px 5px;
            font-weight: 700;
            background: #3b82f6;
            color: #fff;
            font-size: .8rem;
            border-bottom: 2px solid rgba(0, 0, 0, .2);
        }
        .lineup-card:last-child .lineup-table th {
            background: rgba(198, 28, 56, .85);
        }
        .lineup-table td {
            padding: 5px 5px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            font-size: .9rem;
        }
        .lineup-table th:nth-child(1),
        .lineup-table td:nth-child(1) {
            width: 46px;
            min-width: 46px;
            text-align: center;
        }
        .lineup-table th:nth-child(2),
        .lineup-table td:nth-child(2) {
            width: 44px;
            min-width: 44px;
            text-align: center;
        }
        .lineup-table th:nth-child(3),
        .lineup-table td:nth-child(3) {
            min-width: 120px;
            width: 40%;
        }
        .lineup-table th:nth-child(4),
        .lineup-table td:nth-child(4) {
            width: 68px;
            min-width: 68px;
        }
        .lineup-table th:nth-child(5),
        .lineup-table td:nth-child(5) {
            min-width: 90px;
            width: 18%;
        }
        .lineup-table th:nth-child(6),
        .lineup-table td:nth-child(6) {
            width: 50px;
            min-width: 50px;
            text-align: center;
        }
        .row-current {
            background: var(--atbat-bg) !important;
            border-left: 5px solid var(--primary-gold);
        }
        .row-current td {
            color: var(--atbat-text) !important;
            font-weight: 700;
        }
        .row-ondeck {
            background: rgba(100, 116, 139, .15) !important;
            border-left: 4px solid #94a3b8;
        }
        body.dark-mode .row-ondeck {
            background: rgba(148, 163, 184, .35) !important;
        }
        .atbat-btn {
            background: #fff;
            border: 2px solid #3b82f6;
            color: #3b82f6;
            padding: 4px 8px;
            border-radius: 14px;
            font-weight: 800;
            font-size: .72rem;
            white-space: nowrap;
        }
        .drag-handle {
            cursor: grab;
            font-size: .9rem;
            user-select: none;
            flex-shrink: 0;
            margin-right: 3px;
            line-height: 1;
        }
        .duplicate-warn {
            color: #ef4444;
            font-size: .7rem;
            margin-left: 3px;
            font-weight: 800;
        }
        select,
        input,
        textarea {
            background: var(--surface-light);
            border: 1px solid var(--border-light);
            padding: 3px 4px;
            border-radius: 6px;
            font-size: .82rem;
            width: 100%;
            min-height: 30px;
            color: var(--text-light);
            pointer-events: auto !important;
        }
        .jersey-input {
            width: 100%;
            text-align: center;
            font-weight: 700;
            padding: 3px;
            min-height: 30px;
            font-size: .92rem !important;
        }
        .player-cell {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .player-cell select {
            flex: 1;
            min-width: 95px;
            font-size: .88rem !important;
        }
        .notes-textarea {
            font-style: italic;
            width: 100%;
            min-width: 75px;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            resize: vertical;
            min-height: 28px;
            max-height: 56px;
            font-size: .75rem;
            font-family: inherit;
            background: var(--surface-light);
            border: 1px solid var(--border-light);
            padding: 3px 4px;
            border-radius: 6px;
            color: var(--text-light);
            line-height: 1.3;
        }
        body.dark-mode .notes-textarea {
            background: var(--surface-dark);
            color: var(--text-dark);
            border-color: var(--border-dark);
        }
        .order-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--primary-gold);
            color: #0a1c3a;
            font-weight: 900;
            font-size: .78rem;
            flex-shrink: 0;
        }
        .order-circle.dh {
            background: #9aa;
            font-size: .58rem;
            width: auto;
            min-width: 44px;
            padding: 0 4px;
            border-radius: 12px;
        }
        .order-circle.p {
            background: #9aa;
            font-size: .62rem;
        }
        .toggle-btn {
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .58rem;
            font-weight: 700;
            padding: 0 5px;
            line-height: 1.5;
            cursor: pointer;
            text-transform: uppercase;
            min-width: 26px;
        }
        .toggle-btn.off {
            background: #999;
        }
        .header-toggle {
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .72rem;
            font-weight: 700;
            padding: 4px 10px;
            line-height: 1.4;
            cursor: pointer;
            text-transform: uppercase;
            min-width: 34px;
        }
        .header-toggle.off {
            background: #999;
        }
        .add-player-btn {
            background: var(--primary-gold);
            color: #0a1c3a;
            border: none;
            border-radius: 8px;
            font-size: .62rem;
            font-weight: 800;
            padding: 3px 10px;
            cursor: pointer;
            white-space: nowrap;
        }
        .row-toggle-btn {
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;

                STATE.settings.homeColor = f.getElementById('homeColorVal').value;
                STATE.settings.hudAwayBg = f.getElementById('hudAwayBgVal').value;
                STATE.settings.hudHomeBg = f.getElementById('hudHomeBgVal').value;
                STATE.settings.scorebugBg = f.getElementById('scorebugBgColor').value;
                STATE.settings.scorebugTextColor = f.getElementById('scorebugTextColor').value;
                STATE.settings.bugTeamNameFont = f.getElementById('bugTeamNameFont').value;
                STATE.settings.bugTeamNameSize = f.getElementById('bugTeamNameSize').value;
                STATE.settings.bugTeamNameColor = f.getElementById('bugTeamNameColor').value;
                STATE.settings.bugTeamNameWeight = f.getElementById('bugTeamNameWeight').value;
                STATE.settings.cardTeamLabelFont = f.getElementById('cardTeamLabelFont').value;
                STATE.settings.cardTeamLabelSize = f.getElementById('cardTeamLabelSize').value;
                STATE.settings.cardTeamLabelColor = f.getElementById('cardTeamLabelColor').value;
                STATE.settings.cardTeamLabelWeight = f.getElementById('cardTeamLabelWeight').value;
                STATE.settings.cardHeadVisitorBg = f.getElementById('cardHeadVisitorBg').value;
                STATE.settings.cardHeadHomeBg = f.getElementById('cardHeadHomeBg').value;
                applyAllStyles();
                saveSettings();
                alert('✅ All changes applied!');
                renderLineup('visitor');
                renderLineup('home');
            }

            function applyAllStyles() {
                var r = document.documentElement.style;
                var s = STATE.settings;
                r.setProperty('--atbat-bg', s.atbatBg || '#fff9c4');
                r.setProperty('--atbat-text', s.atbatText || '#000');
                r.setProperty('--away-color', s.awayColor || '#1d4ed8');
                r.setProperty('--home-color', s.homeColor || '#c41e3a');
                r.setProperty('--hud-away-bg', s.hudAwayBg || '#e8f0fe');
                r.setProperty('--hud-home-bg', s.hudHomeBg || '#fce8e8');
                r.setProperty('--clock-footer-bg', s.clockBg || '#111111');
                r.setProperty('--clock-footer-text', s.clockText || '#ffffff');
                r.setProperty('--clock-footer-size', (s.clockSize || '13') + 'px');
                r.setProperty('--bug-team-name-font', s.bugTeamNameFont ||
                    "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif");
                r.setProperty('--bug-team-name-size', s.bugTeamNameSize || '0.65rem');
                r.setProperty('--bug-team-name-color', s.bugTeamNameColor || '#ffffff');
                r.setProperty('--bug-team-name-weight', s.bugTeamNameWeight || '700');
                r.setProperty('--card-team-label-font', s.cardTeamLabelFont ||
                    "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif");
                r.setProperty('--card-team-label-size', s.cardTeamLabelSize || '0.85rem');
                r.setProperty('--card-team-label-color', s.cardTeamLabelColor || 'var(--text-light)');
                r.setProperty('--card-team-label-weight', s.cardTeamLabelWeight || '700');
                r.setProperty('--card-head-visitor-bg', s.cardHeadVisitorBg || '#ffffff');
                r.setProperty('--card-head-home-bg', s.cardHeadHomeBg || '#ffffff');
                r.setProperty('--scorebug-bg', s.scorebugBg || 'rgba(0,0,0,.3)');
                r.setProperty('--scorebug-text-color', s.scorebugTextColor || '#ffffff');

                var subtextEl = document.querySelector('.brand-text p');
                if (subtextEl) subtextEl.style.color = s.subtextColor || '#e6b422';
                var brandH1 = document.querySelector('.brand-text h1');
                if (brandH1) brandH1.textContent = s.brand || 'LINEUP CARD LIVE';
                var logoEl = document.querySelector('.logo-main');
                if (logoEl && s.clientLogo) logoEl.src = s.clientLogo;
            }

            function exportAll() { var d = { teams: STATE.teams, game: STATE.game, settings: STATE.settings, script: STATE
                        .script }; var a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], { type: 'application/json' }));
                a.download = 'backup-' + new Date().toISOString().slice(0, 10) + '.json';
                a.click(); }

            function importAll(input) { var f = input.files[0]; if (!f) return; var r = new FileReader();
                r.onload = function(e) { try { var d = JSON.parse(e.target.result); if (d.teams) { STATE.teams = d.teams; for (
                            var tid in STATE.teams) { var tm = STATE.teams[tid];
                            addNAXPlayersToTeam(tm); if (typeof tm.color !== 'string') tm.color = '#1d4ed8'; if (typeof tm
                                .colorSecondary !== 'string') tm.colorSecondary = '#ffffff'; if (typeof tm.logo !==
                                'string') tm.logo = ''; } } if (d.settings) STATE.settings = d.settings; if (d.script) {
                            STATE.script = d.script;
                            document.getElementById('scriptTextarea').value = d.script; }
                    rebuildPositions();
                    applyAllStyles();
                    saveTeams();
                    saveSettings();
                    renderDDs();
                    renderLineup('visitor');
                    renderLineup('home');
                    renderTeamList();
                    renderAdmin();
                    alert('✅ Restored!'); } catch (ex) { alert('❌ Invalid file.'); } };
                r.readAsText(f); }

            function getSerializableState() { var c = JSON.parse(JSON.stringify(STATE));
                delete c.wxTimer;
                delete c.cdTimer;
                delete c.cdTarget;
                delete c.weatherData; return c; }
            async function cloudSave() { var id = document.getElementById('cloud-save-id').value.trim(); if (!id) return; if (
                    !confirm('Save as "' + id + '"?')) return; var st = document.getElementById('cloud-status');
                st.textContent = 'Saving...'; try { var p = getSerializableState(); var r = await fetch(CLOUD_API_BASE +
                        '?id=' + encodeURIComponent(id), { method: 'POST',
                        headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) }); if (!r.ok) throw new Error(
                        'HTTP ' + r.status);
                    st.textContent = '✅ Saved.'; } catch (e) { st.textContent = '❌ Error: ' + e.message; } }
            async function cloudLoad() { var id = document.getElementById('cloud-save-id').value.trim(); if (!id) return; if (
                    !confirm('Load "' + id + '"?')) return; var st = document.getElementById('cloud-status');
                st.textContent = 'Loading...'; try { var r = await fetch(CLOUD_API_BASE + '?id=' + encodeURIComponent(
                    id)); if (!r.ok) throw new Error('HTTP ' + r.status); var d = await r.json(); if (d.teams) { STATE
                        .teams = d.teams; for (var tid in STATE.teams) { var tm = STATE.teams[tid];
                        addNAXPlayersToTeam(tm); if (typeof tm.color !== 'string') tm.color = '#1d4ed8'; if (typeof tm
                            .colorSecondary !== 'string') tm.colorSecondary = '#ffffff'; if (typeof tm.logo !== 'string')
                            tm.logo = ''; } } if (d.settings) STATE.settings = d.settings; if (d.script) { STATE.script = d
                        .script;
                    document.getElementById('scriptTextarea').value = d.script; }
                rebuildPositions();
                applyAllStyles();
                renderDDs();
                renderLineup('visitor');
                renderLineup('home');
                renderTeamList();
                renderAdmin();
                saveTeams();
                saveSettings();
                st.textContent = '✅ Loaded.'; } catch (e) { st.textContent = '❌ Error: ' + e.message; } }
            async function cloudList() { var st = document.getElementById('cloud-status'),
                    le = document.getElementById('cloud-list');
                st.textContent = 'Listing...'; try { var r = await fetch(CLOUD_API_BASE + '?list=true'); var d = await r
                    .json();
                le.innerHTML = ''; if (d.keys && d.keys.length) { d.keys.forEach(function(k) { var li = document
                        .createElement('li');
                    li.textContent = k;
                    li.style.cursor = 'pointer';
                    li.onclick = function() { document.getElementById('cloud-save-id').value = k; }; var del =
                        document.createElement('button');
                    del.textContent = 'X';
                    del.style.cssText =
                        'margin-left:8px;background:var(--accent-red);color:#fff;border:none;border-radius:4px;font-size:.7rem;';
                    del.onclick = function(e) { e.stopPropagation();
                        cloudDelete(k, li); };
                    li.appendChild(del);
                    le.appendChild(li); });
                    st.textContent = d.keys.length + ' save(s).'; } else { st.textContent = 'No saves found.'; } } catch (e) {
                    st.textContent = '❌ Error: ' + e.message; } }

            document.querySelectorAll('.nav-link').forEach(function(b) {
                b.onclick = function() {
                    var view = this.dataset.view;
                    document.querySelectorAll('.view-pane').forEach(function(p) { p.classList.remove(
                        'active'); });
                    if (view === 'score') {
                        document.getElementById('gameday').classList.add('active');
                        STATE.game.showScoreBug = true;
                        updateScoreBugVisibility();
                        saveGame();
                    } else {
                        var targetPane = document.getElementById(view);
                        if (targetPane) targetPane.classList.add('active');
                    }
                    document.querySelectorAll('.nav-link').forEach(function(n) { n.classList.remove('active'); });
                    this.classList.add('active');
                    if (view === 'roster') renderTeamList();
                    if (view === 'admin') renderAdmin();
                };
            });

            (function updateClock() {
                document.getElementById('footerClock').innerText = new Date().toLocaleTimeString('en-US', { hour: '2-digit',
                    minute: '2-digit', second: '2-digit' });
                setTimeout(updateClock, 1000);
            })();

            function getWeatherEmoji(code) {
                if (code <= 0) return '☀️';
                if (code <= 3) return '⛅';
                if (code <= 48) return '🌫️';
                if (code <= 55) return '🌧️';
                if (code <= 57) return '🌧️';
                if (code <= 65) return '🌧️';
                if (code <= 67) return '🌧️';
                if (code <= 77) return '❄️';
                if (code <= 82) return '🌧️';
                if (code <= 86) return '❄️';
                if (code <= 99) return '⛈️';
                return '🌤️';
            }

            function updateWeatherDisplay(current, locationLabel, isFallback) {
                STATE.weatherData = current;
                STATE.weatherLocation = locationLabel;
                STATE.weatherFallback = isFallback;
                var icon = getWeatherEmoji(current.weather_code);
                var temp = Math.round(current.temperature_2m);
                var feelsLike = Math.round(current.apparent_temperature);
                var humidity = current.relative_humidity_2m;
                var windSpeed = Math.round(current.wind_speed_10m);
                var iconEl = document.querySelector('#weatherPill .wx-icon');
                var tempEl = document.getElementById('weatherTemp');
                var detailEl = document.getElementById('weatherDetail');
                var locEl = document.getElementById('weatherLocation');
                var pill = document.getElementById('weatherPill');
                if (iconEl) iconEl.textContent = icon;
                if (tempEl) tempEl.textContent = temp + '°F';
                if (detailEl) detailEl.textContent = 'Feels ' + feelsLike + '° | 💨' + windSpeed + 'mph | 💧' + humidity +
                    '%';
                if (locEl) locEl.textContent = '📍 ' + locationLabel + (isFallback ? ' (default)' : '');
                if (pill) pill.title = 'Temperature: ' + temp + '°F\nFeels Like: ' + feelsLike + '°F\nWind: ' + windSpeed +
                    ' mph\nHumidity: ' + humidity + '%\nLocation: ' + locationLabel + (isFallback ? ' (fallback)' : '');
            }

            async function fetchWeatherData(lat, lon, locationLabel, isFallback) {
                try {
                    var url =
                        'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
                        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph';
                    var response = await fetch(url);
                    var data = await response.json();
                    if (data && data.current) {
                        updateWeatherDisplay(data.current, locationLabel, isFallback);
                    }
                } catch (e) {
                    console.log('Weather fetch failed:', e);
                    var tempEl = document.getElementById('weatherTemp');
                    var locEl = document.getElementById('weatherLocation');
                    if (tempEl) tempEl.textContent = '--°F';
                    if (locEl) locEl.textContent = '📍 ' + locationLabel;
                }
            }

            function initWeather() {
                var dallasLat = 32.7767,
                    dallasLon = -96.7970;
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            var lat = pos.coords.latitude;
                            var lon = pos.coords.longitude;
                            fetchWeatherData(lat, lon, 'GPS (' + lat.toFixed(1) + ',' + lon.toFixed(1) + ')',
                                false);
                        },
                        function() {
                            fetchWeatherData(dallasLat, dallasLon, 'Dallas, TX', true);
                        }, { timeout: 5000, maximumAge: 600000 }
                    );
                } else {
                    fetchWeatherData(dallasLat, dallasLon, 'Dallas, TX', true);
                }
            }

            rebuildPositions();
            renderDDs();
            renderLineup('visitor');
            renderLineup('home');
            updateScoreBug();
            updateScoreBugVisibility();
            updateLastSaved();
            var savedScript = localStorage.getItem('vdw_script');
            if (savedScript) { STATE.script = savedScript;
                document.getElementById('scriptTextarea').value = savedScript; }

            initWeather();
            setInterval(initWeather, 1800000);

            window.markPitch = markPitch;
            window.setCountdown = setCountdown;
            window.startWx = startWx;
            window.resetWx = resetWx;
            window.printBothLineups = printBothLineups;
            window.confirmResetGame = confirmResetGame;
            window.setTheme = setTheme;
            window.markAB = markAB;
            window.updPlayerFromSelect = updPlayerFromSelect;
            window.updPos = updPos;
            window.updNotes = updNotes;
            window.updNum = updNum;
            window.clearSide = clearSide;
            window.printScript = printScript;
            window.clearScript = clearScript;
            window.loadScriptFile = loadScriptFile;
            window.saveScript = saveScript;
            window.newTeam = newTeam;
            window.editTeam = editTeam;
            window.exportAll = exportAll;
            window.importAll = importAll;
            window.saveAdmin = saveAdmin;
            window.cloudSave = cloudSave;
            window.cloudLoad = cloudLoad;
            window.cloudList = cloudList;
            window.deleteTeam = deleteTeam;
            window.cloudSaveTeam = cloudSaveTeam;
            window.cloudLoadTeam = cloudLoadTeam;
            window.toggleSlot = toggleSlot;
            window.toggleHeaderSlot = toggleHeaderSlot;
            window.clearCache = clearCache;
            window.cloudDelete = cloudDelete;
            window.addPlayerToLineup = addPlayerToLineup;
            window.undoRoster = undoRoster;
            window.redoRoster = redoRoster;
            window.exportCSV = exportCSV;
            window.changeRuns = changeRuns;
            window.changeInning = changeInning;
            window.toggleScorebugDisplay = toggleScorebugDisplay;
        })();
    </script>
</body>
</html>
