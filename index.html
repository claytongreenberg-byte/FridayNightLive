<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Friday Night Live">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Friday Night Live – Football PA Console</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root {
            --bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--primary:#1e3a5f;
            --away-header:#1a3a5c;--home-header:#5c1a1a;
            --away-bg:#0f1f3a;--home-bg:#1f1a17;
            --btn:#d4af37;--btn-text:#000;
            --border:#334155;--th-bg:#0f1f3a;--th-text:#d4af37;
            --gap-bg:#0a0f1a;--section-header-bg:#0f1f3a;
            --touch-target:48px;
            --starter-bg:#d4af37;--starter-border:#d4af37;
            --offense-color:#22c55e;--defense-color:#ef4444;--special-color:#8b5cf6;
            --font-family:'Inter', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            --accent-gold:#d4af37;
            --jersey-color:var(--text);
        }
        body.light-mode {
            --bg:#ffffff;--surface:#f3f4f6;--text:#1f2937;--primary:#3b82f6;
            --away-header:#1e3a8a;--home-header:#991b1b;
            --away-bg:#e0e7ff;--home-bg:#fee2e2;
            --btn:#d4af37;--btn-text:#000;
            --border:#d1d5db;--th-bg:#1e3a8a;--th-text:#d4af37;
            --gap-bg:#e2e8f0;--section-header-bg:#e2e8f0;
            --starter-bg:#d4af37;--starter-border:#d4af37;
            --offense-color:#16a34a;--defense-color:#dc2626;--special-color:#7c3aed;
            --jersey-color:var(--text);
        }
        body.seven-mode {
            --bg:#0a0a0a;--surface:#111;--text:#f0f0f0;
            --primary:#0a1628;--btn:#00aaff;--btn-text:#000;
            --border:#222;--th-bg:#0a1628;--th-text:#00aaff;
            --gap-bg:#050505;--section-header-bg:#111;
            --away-header:#0a1628;--home-header:#200808;
            --away-bg:#0a0a0a;--home-bg:#0a0a0a;
            --starter-bg:#00aaff;--starter-border:#00aaff;
            --offense-color:#00ff88;--defense-color:#ff3366;--special-color:#ffcc00;
            --accent-gold:#00aaff;
            --jersey-color:#f0f0f0;
        }
        body {
            font-family:var(--font-family);
            background:var(--bg);color:var(--text);
            height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
            font-size:18px;
            padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-user-select:none;user-select:none;
        }
        /* Turf header */
        header {
            position:relative;
            background: linear-gradient(180deg, #2d6a1e 0%, #1f4d14 100%);
            padding:6px 12px;
            display:flex; align-items:center; justify-content:space-between;
            gap:10px;
            border-bottom:2px solid var(--accent-gold);
            flex-shrink:0; min-height:68px;
            overflow:hidden;
        }
        .turf-overlay{position:absolute;inset:0;pointer-events:none;z-index:0;}
        .turf-overlay svg{width:100%;height:100%;}
        .header-left,.brand-area,.header-center,.header-controls{z-index:1;}
        .header-left{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.4);border-radius:8px;padding:4px 10px;}
        .back-link{color:#fff;font-size:0.7rem;font-weight:600;text-decoration:none;padding:4px 8px;border-radius:6px;}
        .back-link:hover{background:rgba(255,255,255,0.1);}
        .brand-area{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.4);border-radius:8px;padding:6px 14px;}
        .brand-logo{height:100%;max-height:56px;width:auto;object-fit:contain;}
        .brand-text h1{font-size:1.15rem;color:#fff;font-weight:900;text-shadow:0 0 6px rgba(0,0,0,0.8);}
        .brand-text p{font-size:0.65rem;color:var(--accent-gold);font-weight:600;letter-spacing:1px;}
        .header-center{display:flex;align-items:center;gap:10px;}
        .wall-clock{font-size:0.95rem;font-weight:700;color:var(--accent-gold);min-width:100px;text-align:center;background:rgba(0,0,0,0.4);border-radius:8px;padding:6px 12px;}
        .scorebug{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);padding:5px 12px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
        .scorebug .sb-block{display:flex;flex-direction:column;align-items:center;min-width:44px;padding:2px 5px;}
        .scorebug .sb-block:not(:last-child){border-right:1px solid var(--border);padding-right:7px;margin-right:3px;}
        .scorebug .sb-abbr{font-size:7px;font-weight:700;text-transform:uppercase;color:var(--text);opacity:.6;}
        .sb-logo-sm{width:16px;height:16px;object-fit:contain;border-radius:2px;}
        .scorebug .sb-row{display:flex;align-items:center;gap:2px;}
        .scorebug .sb-val{font-size:22px;font-weight:800;color:var(--text);min-width:26px;text-align:center;transition:transform 0.15s ease;}
        .scorebug .sb-val.flash{transform:scale(1.4);color:var(--accent-gold);}
        .scorebug .sb-quarter-val{font-size:15px;font-weight:700;color:var(--accent-gold);min-width:22px;text-align:center;}
        .scorebug button{background:var(--surface);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:50%;font-size:13px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;padding:0;margin:0 1px;cursor:pointer;}
        .scorebug button:active{background:var(--accent-gold);color:#000;}
        .game-clock-display{font-family:monospace;font-size:15px;font-weight:700;color:var(--accent-gold);min-width:48px;text-align:center;}
        .header-controls{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.4);border-radius:8px;padding:4px 8px;}
        .theme-toggle-btn{background:#222;border:1px solid var(--border);color:#fff;font-size:0.75rem;cursor:pointer;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:4px;font-weight:600;}
        .theme-toggle-btn:hover{background:#333;}
        .btn,.btn-sm,.btn-xs{border-radius:60px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform 0.1s;line-height:1;}
        .btn:active,.btn-sm:active,.btn-xs:active{transform:scale(0.94);}
        .btn{background:var(--btn);color:var(--btn-text);font-size:0.9rem;padding:10px 20px;min-height:48px;min-width:48px;}
        .btn-sm{background:var(--btn);color:var(--btn-text);font-size:0.8rem;padding:6px 12px;min-height:40px;min-width:40px;}
        .btn-red{background:#dc2626!important;color:white!important;}
        nav{background:#222;display:flex;padding:0 8px;gap:2px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
        .nav-link{padding:9px 14px;font-size:0.78rem;font-weight:600;background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;border-radius:10px 10px 0 0;white-space:nowrap;min-height:46px;}
        .nav-link.active{background:var(--btn);color:black;}
        main{flex:1;overflow:hidden;padding:6px;display:flex;gap:8px;}
        .game-grid{display:flex;gap:10px;width:100%;height:100%;background:var(--gap-bg);border-radius:14px;padding:5px;}
        .team-card{flex:1;min-width:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
        .team-card.away{background:var(--away-bg);}.team-card.home{background:var(--home-bg);}
        .team-header{padding:6px 8px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;border-bottom:1px solid var(--border);color:#fff;}
        .team-top-row{display:flex;justify-content:space-between;align-items:center;gap:5px;}
        .team-select{font-size:0.85rem;font-weight:700;padding:6px 10px;border-radius:8px;background:#fff;flex:1;border:1px solid var(--border);color:#0a2540;}
        .side-badge{font-size:0.65rem;font-weight:800;padding:2px 8px;border-radius:60px;text-transform:uppercase;}
        .side-badge.away{background:#1e3a5f;color:white;}.side-badge.home{background:#7f1d1d;color:white;}
        .team-logo-inline{width:26px;height:26px;object-fit:contain;border-radius:4px;}
        .unit-tabs{display:flex;gap:2px;}
        .unit-tab{padding:5px 12px;font-size:0.7rem;font-weight:700;background:rgba(255,255,255,0.08);border:none;color:#ffffff88;cursor:pointer;border-radius:18px;min-height:32px;text-transform:uppercase;}
        .unit-tab.active{background:var(--btn);color:#000;}
        .search-bar{display:flex;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid var(--border);background:var(--section-header-bg);}
        .search-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:0.75rem;color:var(--text);}
        .player-list-header, .player-row {display:grid;grid-template-columns:28px 40px 1fr 48px 40px 30px;gap:3px;align-items:center;}
        .player-list-header {padding:4px 8px;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:var(--text);opacity:0.7;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--section-header-bg);min-height:26px;}
        .player-list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
        .player-row{padding:3px 8px;border-bottom:1px solid var(--border);min-height:42px;font-size:0.88rem;transition:background 0.15s;cursor:pointer;}
        .player-row.starter{background:var(--starter-bg)12;border-left:3px solid var(--starter-border);}
        .player-row.highlight{background:rgba(212,175,55,0.2)!important;box-shadow:inset 0 0 6px rgba(212,175,55,0.4);}
        .plyr-photo{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--border);cursor:pointer;}
        .plyr-num{font-weight:800;text-align:center;font-size:0.9rem;color:var(--jersey-color);}
        .plyr-num input,.plyr-name input,.plyr-notes-inline input{background:transparent;border:1px solid transparent;border-radius:4px;padding:2px;min-height:28px;color:var(--text);font-family:inherit;font-size:inherit;}
        .plyr-num input:focus,.plyr-name input:focus,.plyr-notes-inline input:focus{border-color:var(--accent-gold);outline:none;}
        .plyr-pos select{font-size:0.7rem;font-weight:700;background:transparent;border:1px solid transparent;border-radius:4px;color:inherit;padding:2px;min-height:28px;}
        .plyr-pos select:focus{border-color:var(--accent-gold);outline:none;}
        .starter-toggle{background:none;border:2px solid var(--starter-bg);border-radius:50%;width:32px;height:32px;font-size:1.1rem;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--starter-bg);transition:all 0.2s;}
        .starter-toggle.off{border-color:var(--border);color:var(--text);opacity:0.4;}
        .starter-toggle:not(.off){background:var(--starter-bg);color:#000;box-shadow:0 0 6px rgba(212,175,55,0.4);}
        .player-actions-panel{display:none;padding:4px 8px;background:var(--section-header-bg);border-top:1px solid var(--border);flex-wrap:wrap;gap:4px;}
        .player-actions-panel.active{display:flex;}
        .action-chip{background:var(--surface);border:1px solid var(--btn);color:var(--btn);padding:3px 8px;border-radius:12px;font-size:0.65rem;cursor:pointer;font-weight:600;white-space:nowrap;}
        .action-chip:hover{background:var(--btn);color:#000;}
        footer{background:#0a0c10;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;border-top:1px solid var(--accent-gold);color:#fff;font-size:0.7rem;font-weight:600;}
        .footer-logo{height:28px;width:auto;}
        .footer-left,.footer-center,.footer-right{display:flex;align-items:center;gap:8px;}
        .footer-center{flex:1;justify-content:center;}
        .footer-center a{color:#ef4444;text-decoration:underline;font-weight:800;}
        .footer-right{font-family:monospace;color:var(--accent-gold);}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:8px 18px;border-radius:60px;font-size:0.85rem;opacity:0;transition:.2s;pointer-events:none;z-index:999;}
        .toast.show{opacity:1;}
        .panel{background:var(--surface);border-radius:14px;padding:14px;margin:6px;overflow-y:auto;width:100%;-webkit-overflow-scrolling:touch;}
        .roster-layout{display:grid;grid-template-columns:220px 1fr;gap:10px;height:100%;width:100%;}
        .team-sidebar{background:var(--surface);border-radius:14px;padding:10px;overflow-y:auto;border:1px solid var(--border);}
        .roster-workspace{background:var(--surface);border-radius:14px;padding:10px;overflow-y:auto;border:1px solid var(--border);}
        .player-edit-row{display:grid;grid-template-columns:45px 1fr 80px 60px 1fr 30px;gap:4px;margin-bottom:4px;align-items:center;}
        .parse-area{width:100%;height:90px;font-family:monospace;padding:6px;border-radius:6px;border:1px solid var(--border);margin-top:8px;font-size:0.75rem;resize:vertical;}
        .script-container{display:flex;flex-direction:column;height:100%;width:100%;background:var(--surface);border-radius:14px;overflow:hidden;}
        .script-toolbar{display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;flex-shrink:0;background:var(--section-header-bg);}
        .script-editor{flex:1;padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;font-size:1rem;line-height:1.6;color:var(--text);outline:none;background:var(--surface);min-height:0;}
        .soundboard-panel{flex-shrink:0;border-top:1px solid var(--border);padding:6px;background:var(--section-header-bg);}
        .spotlight-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;display:flex;align-items:center;justify-content:center;}
        .spotlight-card{background:var(--surface);border-radius:20px;padding:24px;text-align:center;max-width:400px;width:90%;color:var(--text);}
        .spotlight-card img{width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:16px;border:3px solid var(--accent-gold);}
        .admin-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
        .admin-tab{padding:8px 14px;border-radius:20px;font-size:0.75rem;font-weight:700;background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;}
        .admin-tab.active{background:var(--btn);color:#000;border-color:var(--btn);}
        @media(max-width:900px){.game-grid{flex-direction:column;}.roster-layout{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<header>
    <div class="turf-overlay" aria-hidden="true">
        <svg viewBox="0 0 1000 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="1000" height="60" fill="url(#turfGradient)"/>
            <defs><linearGradient id="turfGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d6a1e"/><stop offset="100%" stop-color="#1f4d14"/></linearGradient></defs>
            <line x1="100" y1="0" x2="100" y2="60" stroke="white" stroke-width="2" opacity="0.2"/><line x1="200" y1="0" x2="200" y2="60" stroke="white" stroke-width="2" opacity="0.2"/>
            <line x1="300" y1="0" x2="300" y2="60" stroke="white" stroke-width="2" opacity="0.2"/><line x1="400" y1="0" x2="400" y2="60" stroke="white" stroke-width="2" opacity="0.2"/>
            <line x1="500" y1="0" x2="500" y2="60" stroke="white" stroke-width="2" opacity="0.2"/><line x1="600" y1="0" x2="600" y2="60" stroke="white" stroke-width="2" opacity="0.2"/>
            <line x1="700" y1="0" x2="700" y2="60" stroke="white" stroke-width="2" opacity="0.2"/><line x1="800" y1="0" x2="800" y2="60" stroke="white" stroke-width="2" opacity="0.2"/>
            <line x1="900" y1="0" x2="900" y2="60" stroke="white" stroke-width="2" opacity="0.2"/>
        </svg>
    </div>
    <div class="header-left"><a href="https://voiceofdfw.com" class="back-link">← VoiceofDFW.com</a></div>
    <div class="brand-area"><img src="FNL.jpg" alt="FNL" class="brand-logo"><div class="brand-text"><h1>🏈 FRIDAY NIGHT LIVE</h1><p>FOOTBALL PA CONSOLE</p></div></div>
    <div class="header-center">
        <div class="wall-clock" id="wallClock">12:00:00 AM</div>
        <div class="scorebug" id="scorebug">
            <div class="sb-block"><span class="sb-abbr" id="sbAwayAbbr">AWAY</span><div class="sb-row"><button onclick="changeScore('away',-1)">−</button><span class="sb-val" id="sbAwayScore">0</span><button onclick="changeScore('away',1)">+</button></div></div>
            <div class="sb-block"><span class="sb-abbr" id="sbHomeAbbr">HOME</span><div class="sb-row"><button onclick="changeScore('home',-1)">−</button><span class="sb-val" id="sbHomeScore">0</span><button onclick="changeScore('home',1)">+</button></div></div>
            <div class="sb-block"><span class="sb-abbr" id="sbQuarterLabel">QTR</span><span class="sb-quarter-val" id="sbQuarter">Q1</span><div class="sb-row"><button onclick="changeQuarter(-1)">◀</button><button onclick="changeQuarter(1)">▶</button></div></div>
            <div class="sb-block"><span class="sb-abbr">GAME</span><span class="game-clock-display" id="gameClockDisplay">--:--</span><div class="sb-row"><button onclick="setGameClock()">⏳</button><button onclick="startGameClock()">▶</button><button onclick="pauseGameClock()">⏸</button><button onclick="resetGameClock()">↺</button></div></div>
        </div>
    </div>
    <div class="header-controls">
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙 Dark</button>
        <button class="btn btn-sm" onclick="printLineups()">🖨️</button>
        <button class="btn btn-red btn-sm" id="resetGameBtn">RESET</button>
    </div>
</header>
<nav id="mainNav"></nav>
<main id="main"></main>
<div class="toast" id="toast"></div>
<footer>
    <div class="footer-left"><img src="FNL.jpg" class="footer-logo" alt=""> <span>Friday Night Live</span></div>
    <div class="footer-center"><span>© 2026 Clayton E. Greenberg | <a href="https://voiceofdfw.com">VoiceofDFW.com</a></span></div>

</footer>

let state={
    currentView:'sport',adminTab:'branding',mode:'dark',
    unit_away:'all',unit_home:'all',

// CLOCK
function updateClock(){const now=new Date();let h=now.getHours();const m=String(now.getMinutes()).padStart(2,'0'),s=String(now.getSeconds()).padStart(2,'0');let t='';if(state.clockFormat==='12h'){const a=h>=12?'PM':'AM';h=h%12||12;t=`${h}:${m}`;if(state.clockShowSeconds)t+=`:${s}`;t+=` ${a}`}else{h=String(h).padStart(2,'0');t=`${h}:${m}`;if(state.clockShowSeconds)t+=`:${s}`}document.getElementById('wallClock').textContent=t}

// SAVE/LOAD

function getTeamBySide(side){return s().teams.find(t=>t.id===(side==='away'?s().awayTeamId:s().homeTeamId))||null}
function getModePositions(){return s().sportMode==='7v7'?(s().positions7v7||D7VPOS):[...TACKLE_POS.offense,...TACKLE_POS.defense,...TACKLE_POS.special]}
function getPlayers(side,unit){const team=getTeamBySide(side);if(!team?.players)return[];const posList=getModePositions();let list=unit==='all'?[...team.players]:team.players.filter(p=>posList.includes(p.pos));list.sort((a,b)=>(parseInt(a.num)||999)-(parseInt(b.num)||999));return list}

    const sp=s();let h='<div class="game-grid">';

                <span class="plyr-num"><input value="${esc(p.num||'')}" onchange="updatePlayerField('${side}','${p.id}','num',this.value)" placeholder="#"></span>
                <span class="plyr-name"><input value="${esc(p.name||'')}" onchange="updatePlayerField('${side}','${p.id}','name',this.value)" placeholder="Name"><span class="plyr-notes-inline"><input value="${esc(p.notes||'')}" onchange="updatePlayerField('${side}','${p.id}','notes',this.value)" placeholder="Notes"></span></span>
                <span class="plyr-pos ${posClass}"><select onchange="updatePlayerField('${side}','${p.id}','pos',this.value)">${posOptions.map(o=>`<option ${p.pos===o?'selected':''}>${o}</option>`).join('')}</select></span>
                <button class="starter-toggle ${p.starter?'':'off'}" onclick="event.stopPropagation();toggleStarter('${side}','${p.id}')">${p.starter?'⭐':'☆'}</button>
                <button onclick="event.stopPropagation();deletePlayer('${side}','${p.id}')" style="background:none;border:none;color:#666;cursor:pointer;font-size:0.7rem;">✕</button>
            </div>`;
        });
        h+=`</div><div id="actions-${side}" class="player-actions-panel"></div>
        <div class="add-player-row" style="display:flex;gap:4px;padding:6px;border-top:1px solid var(--border);"><input id="add-num-${side}" placeholder="#" style="width:40px;"><input id="add-name-${side}" placeholder="Name" style="flex:1;"><select id="add-pos-${side}">${posOptions.map(p=>`<option>${p}</option>`).join('')}</select><input id="add-notes-${side}" placeholder="Notes" style="flex:1;"><button class="btn-sm" onclick="addPlayer('${side}')">+</button></div></div>`;
    });
    h+='</div>';document.getElementById('main').innerHTML=h;updateScorebug();
}
function setUnit(side,unit){state['unit_'+side]=unit;renderSport()}
function switchTeam(side,id){if(!id)return;if(side==='away')s().awayTeamId=id;else s().homeTeamId=id;save();renderSport()}
function addPlayer(side){const nE=document.getElementById('add-num-'+side),nmE=document.getElementById('add-name-'+side),pE=document.getElementById('add-pos-'+side),ntE=document.getElementById('add-notes-'+side);if(!nmE.value.trim()){toast('Enter name');return}const team=getTeamBySide(side);if(!team)return;pushRosterUndo(team);team.players.push({id:generatePlayerId(),num:nE.value.trim(),name:nmE.value.trim(),pos:pE.value,starter:false,notes:ntE?ntE.value.trim():'',photoURL:''});nE.value='';nmE.value='';pE.value='';if(ntE)ntE.value='';nmE.focus();save();renderSport();toast(nmE.value.trim()+' added')}
function toggleStarter(side,pid){const team=getTeamBySide(side);if(!team)return;const p=team.players.find(x=>x.id===pid);if(!p)return;pushRosterUndo(team);p.starter=!p.starter;save();renderSport()}
function deletePlayer(side,pid){const team=getTeamBySide(side);if(!team)return;const p=team.players.find(x=>x.id===pid);if(!p)return;if(!confirm('Delete '+p.name+'?'))return;pushRosterUndo(team);team.players=team.players.filter(x=>x.id!==pid);save();renderSport()}
function togglePossession(side){s().possession=side;renderSport()}
function updatePlayerField(side,pid,field,value){const team=getTeamBySide(side);if(!team)return;const p=team.players.find(x=>x.id===pid);if(!p)return;if(typeof pushRosterUndo==='function')pushRosterUndo(team);p[field]=value;save()}

// SEARCH
function searchPlayers(side,query){
    const rows=document.querySelectorAll(`.player-row[data-side="${side}"]`);

// ROSTER (with Zorts, branding, undo/redo, CSV)
function pushRosterUndo(team){const sp=s();if(!sp.rosterUndoStack)sp.rosterUndoStack=[];sp.rosterUndoStack.push({teamId:team.id,snapshot:JSON.parse(JSON.stringify(team.players))});if(sp.rosterRedoStack)sp.rosterRedoStack=[];else sp.rosterRedoStack=[];if(sp.rosterUndoStack.length>50)sp.rosterUndoStack.shift()}
function undoRoster(){const sp=s();if(!sp.rosterUndoStack?.length){toast('Nothing to undo');return}const action=sp.rosterUndoStack.pop();const team=sp.teams.find(t=>t.id===action.teamId);if(team){sp.rosterRedoStack.push({teamId:team.id,snapshot:JSON.parse(JSON.stringify(team.players))});team.players=action.snapshot}save();renderRoster();toast('↩ Undo')}
function redoRoster(){const sp=s();if(!sp.rosterRedoStack?.length){toast('Nothing to redo');return}const action=sp.rosterRedoStack.pop();const team=sp.teams.find(t=>t.id===action.teamId);if(team){sp.rosterUndoStack.push({teamId:team.id,snapshot:JSON.parse(JSON.stringify(team.players))});team.players=action.snapshot}save();renderRoster();toast('↪ Redo')}
function exportCSV(teamId){const team=s().teams.find(t=>t.id===teamId);if(!team)return;let csv='Number,Name,Position,Starter,Notes,Photo\n';team.players.forEach(p=>{csv+=`"${p.num||''}","${p.name||''}","${p.pos||''}","${p.starter?'Yes':'No'}","${(p.notes||'').replace(/"/g,'""')}","${p.photoURL||''}"\n`});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=(team.name||'roster').replace(/\s/g,'_')+'.csv';a.click();toast('📥 CSV')}

function parseZortsRoster(){
    const raw=document.getElementById('zortsParseArea').value.trim();if(!raw){toast('Paste data');return}
    const name=prompt('Team name:');if(!name?.trim()){toast('Name required');return}
    const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);if(!lines.length){toast('No data');return}
    const hdr=lines[0].split(/[\t,|]+/).map(s=>s.trim().toLowerCase());
    const common=['number','jersey','#','first name','last name','name','position','pos','height','ht','weight','wt','grade','yr','year','school','photo','notes'];
    const isHeader=hdr.some(t=>common.includes(t));
    const posList=getModePositions();
    const newTeam={id:Date.now().toString(36),name:name.trim(),players:[],color:'#1e3a5f',colorSecondary:'#fff',logo:'',mascot:''};
    if(isHeader){
        const map={};hdr.forEach((t,i)=>{if(/^(number|jersey|#)$/.test(t))map.num=i;else if(t==='first name')map.fn=i;else if(t==='last name')map.ln=i;else if(t==='name')map.name=i;else if(/^(position|pos)$/.test(t))map.pos=i;else if(/^(height|ht)$/.test(t))map.ht=i;else if(/^(weight|wt)$/.test(t))map.wt=i;else if(/^(grade|yr|year)$/.test(t))map.gr=i;else if(t==='school')map.sc=i;else if(t==='photo')map.ph=i;else if(t==='notes')map.nt=i});
        for(let i=1;i<lines.length;i++){const p=lines[i].split(/[\t,|]+/).map(s=>s.trim());if(!p.length||p.every(s=>!s))continue;let num='',nm='',pos='',ht='',wt='',gr='',sc='',ph='',nt='';if(map.num!==undefined)num=p[map.num]||'';if(map.fn!==undefined&&map.ln!==undefined)nm=(p[map.fn]||'')+' '+(p[map.ln]||'');else if(map.name!==undefined)nm=p[map.name]||'';if(map.pos!==undefined)pos=p[map.pos]||'';if(map.ht!==undefined)ht=p[map.ht]||'';if(map.wt!==undefined)wt=p[map.wt]||'';if(map.gr!==undefined)gr=p[map.gr]||'';if(map.sc!==undefined)sc=p[map.sc]||'';if(map.ph!==undefined)ph=p[map.ph]||'';if(map.nt!==undefined)nt=p[map.nt]||'';let sum=[];if(ht)sum.push(ht);if(wt)sum.push(wt+' lbs');if(gr)sum.push(gr);if(sc)sum.push(sc);if(nt)sum.push(nt);newTeam.players.push({id:generatePlayerId(),num,name:nm||'Player',pos:posList.includes(pos.toUpperCase())?pos.toUpperCase():pos,starter:false,notes:sum.join(' | '),photoURL:ph})}
    }else{lines.forEach(line=>{let cl=line.replace(/\t/g,' ').replace(/,/g,' ').trim();if(!cl)return;cl=cl.replace(/(\w+),\s*(\w+)/g,'$2 $1');const parts=cl.split(/\s+/);let num='',nm='',pos='';for(let j=0;j<parts.length;j++){if(/^\d{1,3}$/.test(parts[j])){num=parts[j];parts.splice(j,1);break}}if(parts.length){const last=parts[parts.length-1].toUpperCase();if(posList.includes(last)){pos=last;parts.pop()}nm=parts.join(' ')}if(!nm)nm=cl;if(!pos)pos=posList[0]||'QB';newTeam.players.push({id:generatePlayerId(),num,name:nm,pos,starter:false,notes:'',photoURL:''})})}
    if(newTeam.players.length){s().teams.push(newTeam);document.getElementById('zortsParseArea').value='';save();renderRoster();renderNav();toast(`✅ ${newTeam.players.length} players`)}else{toast('No players found')}
}
window.parseZortsRoster=parseZortsRoster;

function renderRoster(){
    const sp=s();const ct=sp.teams.find(t=>t.id===sp.currentTeamId)||sp.teams[0];const pl=ct?ct.players:[];
    let sb='<h3>TEAM LIBRARY</h3>';sp.teams.forEach(t=>{sb+=`<div class="team-item${t.id===sp.currentTeamId?' active':''}" onclick="selectRosterTeam('${t.id}')">${esc(t.name)} (${t.players.length})</div>`});sb+='<button class="btn-sm" style="margin-top:8px;width:100%" onclick="newTeam()">+ New Team</button>';

    document.getElementById('main').innerHTML=`<div class="panel"><div class="roster-layout"><div class="team-sidebar">${sb}</div><div class="roster-workspace">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;"><input id="editTeamName" value="${esc(ct?ct.name:'')}" placeholder="Team Name" style="flex:1;min-width:140px;"><button class="btn-sm" id="svBtn">💾 Save</button><button class="btn-sm" onclick="exportCSV('${ct?ct.id:''}')">📊 CSV</button><button class="btn-sm btn-red" id="delBtn">🗑️ Delete</button></div>
        <div style="display:flex;gap:4px;margin-bottom:6px;"><button class="btn-sm" onclick="undoRoster()">↩ Undo</button><button class="btn-sm" onclick="redoRoster()">↪ Redo</button></div>
        <div class="branding-section"><h4>Team Branding</h4><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <div><label>Primary</label><input type="color" id="tc" value="${ct?ct.color:'#1e3a5f'}"></div>
            <div><label>Secondary</label><input type="color" id="tc2" value="${ct?ct.colorSecondary:'#fff'}"></div>
            <div><label>Mascot</label><input id="tm" value="${esc(ct?ct.mascot:'')}"></div>
            <div><label>Logo</label><img id="tlp" src="${ct?ct.logo:''}" style="width:36px;height:36px;${ct&&ct.logo?'':'display:none'}"><input type="file" id="tlf" accept="image/*"></div>
        </div></div>
        <div style="display:grid;grid-template-columns:45px 1fr 80px 60px 1fr 30px;gap:4px;font-size:0.6rem;font-weight:600;margin:10px 0 4px;opacity:0.7;"><span>#</span><span>Name</span><span>Pos</span><span>Role</span><span>Notes</span><span></span></div>
        <div id="rpg">${pr}</div>
        <button class="btn-sm" id="addBtn" style="margin-top:6px;">➕ Add Player</button>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;"><textarea class="parse-area" id="parseTxt" placeholder="Paste roster..."></textarea><div style="display:flex;flex-direction:column;gap:4px;"><label for="rf" class="btn-sm" style="cursor:pointer;">📁 Upload</label><input type="file" id="rf" accept=".txt,.csv" style="display:none;"><button class="btn-sm" id="parseBtn">📝 Parse</button></div></div>
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px;"><h4>Zorts Bulk Import</h4><textarea id="zortsParseArea" class="parse-area" placeholder="Paste Zorts CSV..."></textarea><div style="margin-top:4px;display:flex;gap:6px;"><button class="btn-sm" onclick="parseZortsRoster()">📥 Import as New Team</button><button class="btn-sm btn-red" onclick="document.getElementById('zortsParseArea').value=''">Clear</button></div></div>
    </div></div></div>`;
    document.getElementById('svBtn').onclick=()=>{const t=sp.teams.find(t=>t.id===sp.currentTeamId);if(!t)return;const old=JSON.parse(JSON.stringify(t.players));t.name=document.getElementById('editTeamName').value.trim();if(!t.name){toast('Name required');return}t.players=collectRosterPlayers();t.color=document.getElementById('tc').value;t.colorSecondary=document.getElementById('tc2').value;t.mascot=document.getElementById('tm').value.trim();if(JSON.stringify(old)!==JSON.stringify(t.players))pushRosterUndo(t);save();renderRoster();renderNav();toast('Saved')};
    document.getElementById('delBtn').onclick=()=>{const t=sp.teams.find(t=>t.id===sp.currentTeamId);if(!t||!confirm('Delete '+t.name+'?'))return;sp.teams=sp.teams.filter(x=>x.id!==sp.currentTeamId);sp.currentTeamId=sp.teams.length?sp.teams[0].id:null;if(sp.awayTeamId===t.id)sp.awayTeamId='';if(sp.homeTeamId===t.id)sp.homeTeamId='';save();renderRoster();renderNav();renderSport();toast('Deleted')};
    document.getElementById('addBtn').onclick=()=>{const t=sp.teams.find(t=>t.id===sp.currentTeamId);if(!t)return;pushRosterUndo(t);t.players.push({id:generatePlayerId(),num:'',name:'',pos:'',starter:false,notes:'',photoURL:''});save();renderRoster()};
    document.getElementById('parseBtn').onclick=()=>parseRosterText(document.getElementById('parseTxt').value);
    document.getElementById('rf').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('parseTxt').value=ev.target.result;parseRosterText(ev.target.result)};r.readAsText(f)});
    document.getElementById('tlf').addEventListener('change',function(e){const f=e.target.files[0];if(!f?.type.startsWith('image/'))return;const r=new FileReader();r.onload=ev=>{const t=sp.teams.find(t=>t.id===sp.currentTeamId);if(t){t.logo=ev.target.result;document.getElementById('tlp').src=ev.target.result;document.getElementById('tlp').style.display='inline-block';save();toast('Logo updated')}};r.readAsDataURL(f)});
}
function parseRosterText(txt){const t=s().teams.find(t=>t.id===s().currentTeamId);if(!t)return;if(!txt.trim()){toast('Empty');return}pushRosterUndo(t);const posList=getModePositions();const lines=txt.split(/\r?\n/);const arr=[];lines.forEach(line=>{if(!line.trim())return;let num='',rest=line.trim();const m=rest.match(/^(\d{1,3})\s+/);if(m){num=m[1];rest=rest.slice(m[0].length).trim()}let pos='',name=rest;const words=rest.split(/\s+/);if(words.length&&posList.includes(words[words.length-1].toUpperCase())){pos=words.pop().toUpperCase();name=words.join(' ')}if(name)arr.push({id:generatePlayerId(),num,name,pos,starter:false,notes:'',photoURL:''})});if(!arr.length){toast('No players');return}t.players=arr;save();renderRoster();toast(arr.length+' parsed')}
function collectRosterPlayers(){const g=document.getElementById('rpg');if(!g)return[];const rows=g.querySelectorAll('.player-edit-row');const a=[];rows.forEach(r=>{a.push({id:'',num:r.querySelector('.rp-num')?.value||'',name:r.querySelector('.rp-name')?.value||'',pos:r.querySelector('.rp-pos')?.value||'',starter:r.querySelector('.rp-starter')?.value==='1',notes:r.querySelector('.rp-notes')?.value||'',photoURL:''})});return a}
function selectRosterTeam(tid){s().currentTeamId=tid;renderRoster()}
function newTeam(){let n=prompt('Team name:');while(!n?.trim()){n=prompt('Name:');if(n===null)return}const sp=s();sp.teams.push({id:Date.now().toString(36),name:n.trim(),players:[],color:'#1e3a5f',colorSecondary:'#fff',logo:'',mascot:''});sp.currentTeamId=sp.teams[sp.teams.length-1].id;save();renderRoster();renderNav()}

// SCRIPT
function execCmd(cmd,val=null){document.execCommand(cmd,false,val);const ed=document.getElementById('scriptEditor');if(ed)ed.focus()}
function insertMacro(text){const ed=document.getElementById('scriptEditor');if(!ed)return;ed.focus();const sel=window.getSelection();if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();const node=document.createTextNode(text);range.insertNode(node);range.setStartAfter(node);range.setEndAfter(node);sel.removeAllRanges();sel.addRange(range)}else{ed.textContent+=text}}
function playSound(fn){try{new Audio('sounds/'+fn+'.mp3').play().catch(()=>toast('🔇'))}catch(e){toast('🔇')}}
function renderScript(){
    const sp=s();
    document.getElementById('main').innerHTML=`<div class="script-container"><h3 style="padding:8px 12px 0;">PA SCRIPT</h3>
        <div class="macro-row" style="display:flex;gap:4px;flex-wrap:wrap;padding:4px 8px;">
            <button class="btn-sm" onclick="insertMacro('Welcome to the 2026 Premier Events USA 7on7 Tournament!')">Welcome</button>
            <button class="btn-sm" onclick="insertMacro('First down!')">1st Down</button>
            <button class="btn-sm" onclick="insertMacro('Touchdown!')">Touchdown</button>
        </div>
        <div class="script-toolbar">
            <select onchange="execCmd('fontName',this.value)"><option value="Inter">Inter</option><option value="Roboto">Roboto</option><option value="monospace">Mono</option></select>
            <select onchange="execCmd('fontSize',this.value)"><option value="1">S</option><option value="3" selected>M</option><option value="5">L</option></select>
            <button onclick="execCmd('bold')"><b>B</b></button><button onclick="execCmd('italic')"><i>I</i></button><button onclick="execCmd('underline')"><u>U</u></button>
        </div>
        <div id="scriptEditor" class="script-editor" contenteditable="true" placeholder="PA announcements...">${sp.scriptContent||''}</div>
        <div class="soundboard-panel"><details><summary>Soundboard</summary><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">
            <button class="btn-sm" onclick="playSound('firstdown')">1st Down</button><button class="btn-sm" onclick="playSound('touchdown')">TD</button>
            <button class="btn-sm" onclick="playSound('horn')">Horn</button><button class="btn-sm" onclick="playSound('crowd')">Crowd</button>
        </div></details></div>
        <div class="script-bottom-bar" style="display:flex;gap:6px;padding:6px 8px;"><button class="btn btn-sm" id="saveScript">Save</button><button class="btn btn-sm" id="printScript">Print</button></div>
    </div>`;
    document.getElementById('saveScript').onclick=()=>{sp.scriptContent=document.getElementById('scriptEditor').innerHTML;save();toast('Saved')};
    document.getElementById('printScript').onclick=()=>{const w=window.open();w.document.write(`<pre>${document.getElementById('scriptEditor').innerHTML}</pre>`);w.print()};
}

// ADMIN (robust, word labels)
function renderAdmin(){
    const tabs=['branding','colors','theme','fonts','clock','7v7','teams','backup','cloud'];
    const labels={branding:'Branding',colors:'Colors',theme:'Theme',fonts:'Fonts',clock:'Clock','7v7':'7v7 Mode',teams:'Teams',backup:'Backup',cloud:'Cloud'};
    let h=`<div class="panel"><h3>ADMIN CONSOLE</h3><div class="admin-tabs">`;
    tabs.forEach(t=>h+=`<button class="admin-tab ${state.adminTab===t?'active':''}" data-admin-tab="${t}">${labels[t]}</button>`);
    h+=`</div><div id="adminContent"></div></div>`;document.getElementById('main').innerHTML=h;
    document.querySelectorAll('[data-admin-tab]').forEach(b=>b.onclick=()=>{state.adminTab=b.dataset.adminTab;renderAdmin()});renderAdminContent();
}
function renderAdminContent(){
    const c=document.getElementById('adminContent');if(!c)return;const sp=s();
    if(state.adminTab==='branding'){c.innerHTML=`<h4>Branding</h4><label>Title</label><input id="bt" value="${esc(state.brand.title)}"><label>Subtitle</label><input id="bs" value="${esc(state.brand.subtitle)}"><button class="btn-sm" onclick="state.brand={title:document.getElementById('bt').value,subtitle:document.getElementById('bs').value};save();toast('Updated')" style="margin-top:8px;">Apply</button>`}
    else if(state.adminTab==='colors'){let h='<h4>Color Settings</h4><div class="color-grid">';const cl={bg:'Background',surface:'Surface',text:'Text',primary:'Primary',btn:'Button',border:'Border',starter:'Starter'};for(const[k,l]of Object.entries(cl))h+=`<div><label>${l}</label><input type="color" value="${state.colors[k]}" onchange="updateColor('${k}',this.value)"></div>`;h+=`</div>`;c.innerHTML=h}
    else if(state.adminTab==='theme'){c.innerHTML=`<h4>Theme Mode</h4><div class="mode-toggle"><button class="mode-btn ${state.mode==='dark'?'active':''}" onclick="applyDarkMode()">Dark</button><button class="mode-btn ${state.mode==='light'?'active':''}" onclick="applyLightMode()">Light</button></div>`}
    else if(state.adminTab==='fonts'){c.innerHTML=`<h4>Font Family</h4><select id="fs">${[{n:'Inter',v:"'Inter',sans-serif"},{n:'Roboto',v:"'Roboto',sans-serif"},{n:'System UI',v:'system-ui'}].map(f=>`<option value="${f.v}" ${state.fontFamily===f.v?'selected':''}>${f.n}</option>`).join('')}</select><button class="btn-sm" onclick="state.fontFamily=document.getElementById('fs').value;updateTheme()" style="margin-left:8px;">Apply</button>`}
    else if(state.adminTab==='clock'){c.innerHTML=`<h4>Clock Settings</h4><label><input type="radio" name="cf" value="12h" ${state.clockFormat==='12h'?'checked':''}> 12-hour</label> <label><input type="radio" name="cf" value="24h" ${state.clockFormat==='24h'?'checked':''}> 24-hour</label><br><label><input type="checkbox" id="cs" ${state.clockShowSeconds?'checked':''}> Show seconds</label><br><button class="btn-sm" onclick="state.clockFormat=document.querySelector('input[name=cf]:checked').value;state.clockShowSeconds=document.getElementById('cs').checked;save();updateClock()" style="margin-top:6px;">Apply</button>`}
    else if(state.adminTab==='7v7'){
        const cm=sp.sportMode||'tackle';const p7=sp.positions7v7?sp.positions7v7.join(', '):D7VPOS.join(', ');
        c.innerHTML=`<h4>7v7 Mode</h4>
            <p style="font-size:0.8rem;opacity:0.7;margin-bottom:8px;">Current: <strong>${cm==='7v7'?'7v7 Passing':'Tackle (11-man)'}</strong></p>
            <button class="btn btn-sm" onclick="toggle7v7Mode()">${cm==='7v7'?'Switch to Tackle':'Switch to 7v7'}</button>
            <div style="margin-top:12px;"><h5>7v7 Positions</h5><p style="font-size:0.7rem;opacity:0.7;">Comma-separated list</p><textarea id="p7e" style="width:100%;height:50px;font-family:monospace;">${esc(p7)}</textarea><button class="btn-sm" onclick="s().positions7v7=document.getElementById('p7e').value.split(',').map(s=>s.trim()).filter(Boolean);save();toast('Positions saved')" style="margin-top:6px;">Save Positions</button></div>`;
        window.toggle7v7Mode=function(){sp.sportMode=sp.sportMode==='7v7'?'tackle':'7v7';updateScorebug();save();renderSport();renderRoster();renderAdmin();toast('Mode switched')};
    }
    else if(state.adminTab==='teams'){let h='';sp.teams.forEach(t=>h+=`<div style="display:flex;gap:8px;padding:4px;"><span style="flex:1;">${esc(t.name)} (${t.players.length})</span><button class="btn-sm" onclick="state.sports.football.currentTeamId='${t.id}';state.currentView='roster';renderAll()">Edit</button></div>`);c.innerHTML=h||'<p>No teams yet. Import or create one.</p>'}
    else if(state.adminTab==='backup'){c.innerHTML=`<h4>Backup & Restore</h4><button class="btn btn-sm" onclick="exportAll()">Export All Data</button><button class="btn btn-sm" onclick="document.getElementById('impf').click()" style="margin-left:6px;">Import Data</button><input type="file" id="impf" hidden accept=".json" onchange="importAll(this)"><button class="btn-red btn-sm" onclick="if(confirm('Clear all data?')){localStorage.clear();location.reload()}" style="margin-top:10px;">Clear All Data</button>`}
    else if(state.adminTab==='cloud'){c.innerHTML=`<h4>Cloud Sync</h4><button class="btn-sm" onclick="cloudSaveAll()">Save All Teams to Cloud</button><button class="btn-sm" onclick="cloudLoadTeams()" style="margin-left:6px;">Load Team from Cloud</button>`}
}
function updateColor(k,v){state.colors[k]=v;updateTheme();toast('Color updated')}
async function cloudSaveTeam(id){const t=s().teams.find(t=>t.id===id);if(!t)return;try{await fetch(CLOUD_API_BASE+'?id=friday_'+encodeURIComponent(id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(t)});toast('Saved')}catch(e){toast('Failed')}}
async function cloudLoadTeams(){try{const r=await fetch(CLOUD_API_BASE+'?list=true');const d=await r.json();const keys=(d.keys||[]).filter(k=>k.startsWith('friday_'));if(!keys.length){toast('None');return}const k=prompt('Team key:\n'+keys.map(k=>k.replace('friday_','')).join(', '));if(!k)return;const r2=await fetch(CLOUD_API_BASE+'?id='+encodeURIComponent(k.startsWith('friday_')?k:'friday_'+k));const t=await r2.json();if(!t.id||!t.name)throw new Error('Invalid');const sp=s();const ex=sp.teams.find(x=>x.id===t.id);if(ex&&!confirm('Overwrite?'))return;if(t.players)t.players.forEach(p=>{if(!p.id)p.id=generatePlayerId()});if(ex){ex.name=t.name;ex.players=t.players||[]}else{t.id=t.id.replace('friday_','');sp.teams.push(t)}sp.currentTeamId=t.id;save();renderRoster();renderNav();toast('Loaded')}catch(e){toast('Failed')}}
async function cloudSaveAll(){if(!confirm('Save all?'))return;try{let c=0;for(const t of s().teams){try{await fetch(CLOUD_API_BASE+'?id=friday_'+encodeURIComponent(t.id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(t)});c++}catch(e){}}toast(c+' saved')}catch(e){toast('Failed')}}

function exportAll(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)]));a.download='fnl_backup.json';a.click()}
function importAll(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);state=d;save();updateTheme();renderAll();toast('Restored')}catch(e){toast('Invalid file')}};r.readAsText(f)}

function printLineups(){const sp=s();const at=sp.teams.find(t=>t.id===sp.awayTeamId),ht=sp.teams.find(t=>t.id===sp.homeTeamId);let h=`<html><head><title>${esc(at?.name||'Away')} vs ${esc(ht?.name||'Home')}</title><style>body{font-family:sans-serif;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #000;padding:6px}th{background:#ddd}</style></head><body><h1>${esc(at?.name||'Away')} vs ${esc(ht?.name||'Home')}</h1>`;['away','home'].forEach(s=>{const t=getTeamBySide(s);h+=`<h2>${esc(t?.name||'')}</h2><table><tr><th>#</th><th>Name</th><th>Pos</th><th>Notes</th></tr>`;getPlayers(s,'all').forEach(p=>h+=`<tr><td>${esc(p.num)}</td><td>${esc(p.name)}</td><td>${esc(p.pos)}</td><td>${esc(p.notes||'')}</td></tr>`);h+=`</table>`});h+='</body></html>';const w=window.open();w.document.write(h);w.onload=()=>w.print()}
function globalReset(){if(confirm('Reset all game data?')){state.sports.football=defaultGameState();save();renderAll();toast('Reset complete')}}

document.addEventListener('keydown',e=>{if(e.key==='s'&&(e.ctrlKey||e.metaKey)){e.preventDefault();save();toast('Saved')}});
document.getElementById('resetGameBtn').onclick=globalReset;

window.changeScore=changeScore;window.changeQuarter=changeQuarter;window.togglePossession=togglePossession;
window.addPlayer=addPlayer;window.toggleStarter=toggleStarter;window.deletePlayer=deletePlayer;
window.setUnit=setUnit;window.switchTeam=switchTeam;window.updatePlayerField=updatePlayerField;
window.showSpotlight=showSpotlight;window.searchPlayers=searchPlayers;window.togglePlayerActions=togglePlayerActions;
window.insertMacro=insertMacro;window.execCmd=execCmd;window.playSound=playSound;
window.setGameClock=setGameClock;window.startGameClock=startGameClock;window.pauseGameClock=pauseGameClock;window.resetGameClock=resetGameClock;
window.undoRoster=undoRoster;window.redoRoster=redoRoster;window.exportCSV=exportCSV;
window.parseZortsRoster=parseZortsRoster;window.selectRosterTeam=selectRosterTeam;window.newTeam=newTeam;
window.cloudSaveTeam=cloudSaveTeam;window.cloudLoadTeams=cloudLoadTeams;window.cloudSaveAll=cloudSaveAll;
window.applyLightMode=applyLightMode;window.applyDarkMode=applyDarkMode;window.toggleTheme=toggleTheme;
window.exportAll=exportAll;window.importAll=importAll;window.printLineups=printLineups;

(async function(){await load();renderAll()})();
</script>
