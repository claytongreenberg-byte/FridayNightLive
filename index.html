<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Friday Night Live – V2.0 Press Box Console</title>
    <style>
        :root {
            /* Dark Mode Defaults */
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --primary: #2563eb;
            --border: #334155;
            --accent: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --away-bg: #1e3a8a;
            --home-bg: #7f1d1d;
        }
        
        body.light-mode {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text: #0f172a;
            --primary: #2563eb;
            --border: #cbd5e1;
            --accent: #d97706;
            --away-bg: #bfdbfe;
            --home-bg: #fecaca;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--surface);
            border-bottom: 2px solid var(--border);
            height: 90px;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            height: 100%;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: bold;
        }

        .system-controls {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--surface);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }
        button.action { background-color: var(--primary); color: white; border-color: var(--primary); }
        button.accent { background-color: var(--accent); color: black; border-color: var(--accent); }

        /* COMMAND CENTER LAYOUT */
        main {
            display: grid;
            grid-template-columns: 1fr 400px 1fr;
            gap: 15px;
            padding: 15px;
            flex: 1;
            overflow: hidden;
        }

        /* TEAM PANELS */
        .team-panel {
            background-color: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .team-header {
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }

        .team-panel.away .team-header { background-color: var(--away-bg); color: white; }
        .team-panel.home .team-header { background-color: var(--home-bg); color: white; }

        .roster-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .player-row {
            display: grid;
            grid-template-columns: 40px 1fr 60px 40px;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            border-radius: 6px;
        }

        .player-row:hover { background-color: rgba(128, 128, 128, 0.1); }
        .player-num { font-weight: 900; font-size: 1.2rem; text-align: center; }
        .player-name { font-weight: bold; font-size: 1.1rem; }
        .player-pos { font-size: 0.9rem; opacity: 0.8; text-align: right; }
        
        .starter-star {
            font-size: 1.2rem;
            text-align: center;
            opacity: 0.2;
        }
        .player-row.is-starter .starter-star { opacity: 1; color: var(--accent); text-shadow: 0 0 5px var(--accent); }

        /* CENTER COLUMN: SCOREBUG */
        .center-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .scorebug {
            background-color: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .clock-display {
            font-family: monospace;
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent);
            text-align: center;
            line-height: 1;
        }

        .clock-display.flash {
            animation: pulseRed 0.5s infinite;
        }

        @keyframes pulseRed {
            0% { color: var(--danger); transform: scale(1); }
            50% { color: white; transform: scale(1.05); }
            100% { color: var(--danger); transform: scale(1); }
        }

        .clock-controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .clock-controls button { flex: 1; padding: 15px; font-size: 1.1rem; }

        .score-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
            margin-top: 10px;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .score-val { font-size: 3rem; font-weight: 900; }
        .score-label { font-size: 0.9rem; font-weight: bold; opacity: 0.7; letter-spacing: 1px; }

        .qtr-box {
            text-align: center;
        }
        .qtr-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .quick-actions button { padding: 15px; }

        /* IPAD MODAL (DIALOG) */
        dialog {
            margin: auto;
            padding: 0;
            border: none;
            border-radius: 12px;
            background: transparent;
            width: 90%;
            max-width: 400px;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background-color: var(--surface);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            background-color: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .modal-buttons button { flex: 1; padding: 15px; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div>
            <h1>Friday Night Live</h1>
            <p>7v7 COMMAND CENTER</p>
        </div>
    </div>
    <div class="system-controls">
        <button onclick="toggleTheme()">🌓 Theme</button>
        <button onclick="exportData()">💾 Export JSON</button>
        <button onclick="document.getElementById('importFile').click()">📂 Import JSON</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>
</header>

<main>
    <div class="team-panel away">
        <div class="team-header" id="awayName">Away Team</div>
        <div class="roster-list" id="awayRoster">
            </div>
    </div>

    <div class="center-col">
        <div class="scorebug">
            <div class="clock-display" id="gameClock">25:00</div>
            <div class="clock-controls">
                <button class="action" onclick="toggleClock()" id="clockBtn">START</button>
                <button onclick="resetClock()">RESET</button>
            </div>
            
            <div class="score-row">
                <div class="score-box">
                    <span class="score-label">AWAY</span>
                    <span class="score-val" id="awayScore">0</span>
                    <div class="quick-actions" style="display:flex; gap:5px;">
                        <button onclick="adjScore('away', 1)">+1</button>
                        <button onclick="adjScore('away', 6)">+6</button>
                    </div>
                </div>
                
                <div class="qtr-box">
                    <span class="score-label">QTR</span>
                    <div class="qtr-val" id="quarterVal">1</div>
                </div>

                <div class="score-box">
                    <span class="score-label">HOME</span>
                    <span class="score-val" id="homeScore">0</span>
                    <div class="quick-actions" style="display:flex; gap:5px;">
                        <button onclick="adjScore('home', 1)">+1</button>
                        <button onclick="adjScore('home', 6)">+6</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="team-panel home">
        <div class="team-header" id="homeName">Home Team</div>
        <div class="roster-list" id="homeRoster">
            </div>
    </div>
</main>

<dialog id="editModal">
    <div class="modal-content">
        <h2 style="text-align: center; text-transform: uppercase;">Edit Player</h2>
        <input type="hidden" id="editTeam">
        <input type="hidden" id="editId">
        
        <div>
            <label style="font-size: 0.8rem; opacity: 0.7;">Number</label>
            <input type="number" id="editNum">
        </div>
        <div>
            <label style="font-size: 0.8rem; opacity: 0.7;">Name</label>
            <input type="text" id="editName">
        </div>
        <div>
            <label style="font-size: 0.8rem; opacity: 0.7;">Position</label>
            <input type="text" id="editPos">
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="editStarter" style="width: 24px; height: 24px;">
            <label style="font-weight: bold;">Starting 7</label>
        </div>
        
        <div class="modal-buttons">
            <button onclick="document.getElementById('editModal').close()">Cancel</button>
            <button class="accent" onclick="savePlayerEdit()">Save Changes</button>
        </div>
    </div>
</dialog>

<script>
    // --- 1. DATA FIREWALL ---
    // League Data is kept strictly separate from live game state.
    let leagueData = {
        awayTeamName: "Eagles",
        homeTeamName: "Wildcats",
        awayRoster: [
            { id: 'a1', num: '1', name: 'James Smith', pos: 'QB', starter: true },
            { id: 'a2', num: '5', name: 'Mike Johnson', pos: 'WR', starter: true }
        ],
        homeRoster: [
            { id: 'h1', num: '12', name: 'Tom Brady', pos: 'QB', starter: true },
            { id: 'h2', num: '88', name: 'Ceedee Lamb', pos: 'WR', starter: true }
        ]
    };

    let gameState = {
        clockRunning: false,
        timeRemaining: 25 * 60, // 25 minutes
        defaultTime: 25 * 60,
        awayScore: 0,
        homeScore: 0,
        quarter: 1
    };

    // --- 2. GAME CLOCK (Detached interval, no re-renders) ---
    let masterClockInterval = null;
    const clockDisplay = document.getElementById('gameClock');
    const clockBtn = document.getElementById('clockBtn');

    // AudioContext for synthesize beep (No base64/external files needed)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playBuzzer() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
        
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5);
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function toggleClock() {
        if (gameState.clockRunning) {
            clearInterval(masterClockInterval);
            gameState.clockRunning = false;
            clockBtn.textContent = "START";
            clockBtn.classList.remove('accent');
            clockBtn.classList.add('action');
        } else {
            clockDisplay.classList.remove('flash');
            gameState.clockRunning = true;
            clockBtn.textContent = "PAUSE";
            clockBtn.classList.remove('action');
            clockBtn.classList.add('accent');
            
            masterClockInterval = setInterval(() => {
                if (gameState.timeRemaining > 0) {
                    gameState.timeRemaining--;
                    clockDisplay.textContent = formatTime(gameState.timeRemaining);
                } else {
                    // Clock hits 0:00
                    clearInterval(masterClockInterval);
                    gameState.clockRunning = false;
                    clockDisplay.classList.add('flash');
                    playBuzzer();
                    
                    // Auto reset for next quarter
                    setTimeout(() => {
                        gameState.quarter++;
                        if(gameState.quarter > 4) gameState.quarter = 1;
                        document.getElementById('quarterVal').textContent = gameState.quarter;
                        resetClock();
                    }, 3000);
                }
            }, 1000);
        }
    }

    function resetClock() {
        clearInterval(masterClockInterval);
        gameState.clockRunning = false;
        gameState.timeRemaining = gameState.defaultTime;
        clockDisplay.textContent = formatTime(gameState.timeRemaining);
        clockDisplay.classList.remove('flash');
        clockBtn.textContent = "START";
        clockBtn.classList.remove('accent');
        clockBtn.classList.add('action');
    }

    // --- 3. SCOREBUG LOGIC ---
    function adjScore(team, points) {
        gameState[`${team}Score`] += points;
        document.getElementById(`${team}Score`).textContent = gameState[`${team}Score`];
    }

    // --- 4. ROSTER RENDERING & IPAD EDITING ---
    function renderRosters() {
        document.getElementById('awayName').textContent = leagueData.awayTeamName;
        document.getElementById('homeName').textContent = leagueData.homeTeamName;

        const renderTeam = (teamKey, targetId) => {
            const container = document.getElementById(targetId);
            container.innerHTML = '';
            
            leagueData[teamKey].forEach(player => {
                const row = document.createElement('div');
                row.className = `player-row ${player.starter ? 'is-starter' : ''}`;
                row.onclick = () => openEditModal(teamKey, player.id);
                
                row.innerHTML = `
                    <div class="player-num">${player.num}</div>
                    <div class="player-name">${player.name}</div>
                    <div class="player-pos">${player.pos}</div>
                    <div class="starter-star">⭐</div>
                `;
                container.appendChild(row);
            });
        };

        renderTeam('awayRoster', 'awayRoster');
        renderTeam('homeRoster', 'homeRoster');
    }

    function openEditModal(team, playerId) {
        const player = leagueData[team].find(p => p.id === playerId);
        if(!player) return;

        document.getElementById('editTeam').value = team;
        document.getElementById('editId').value = player.id;
        document.getElementById('editNum').value = player.num;
        document.getElementById('editName').value = player.name;
        document.getElementById('editPos').value = player.pos;
        document.getElementById('editStarter').checked = player.starter;

        document.getElementById('editModal').showModal();
    }

    function savePlayerEdit() {
        const team = document.getElementById('editTeam').value;
        const id = document.getElementById('editId').value;
        
        const player = leagueData[team].find(p => p.id === id);
        if(player) {
            player.num = document.getElementById('editNum').value;
            player.name = document.getElementById('editName').value;
            player.pos = document.getElementById('editPos').value;
            player.starter = document.getElementById('editStarter').checked;
        }
        
        document.getElementById('editModal').close();
        renderRosters();
    }

    // --- 5. THEME & DATA MANAGEMENT ---
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(leagueData, null, 2));
        const anchor = document.createElement('a');
        anchor.href = dataStr;
        anchor.download = "teams.json";
        anchor.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                leagueData = JSON.parse(e.target.result);
                renderRosters();
                alert("Rosters loaded successfully!");
            } catch (err) {
                alert("Error reading file.");
            }
        };
        reader.readAsText(file);
    }

    // Initialize UI on load
    clockDisplay.textContent = formatTime(gameState.timeRemaining);
    renderRosters();

</script>
</body>
</html>
